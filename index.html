<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light">
<title>דוחות טרום-אירוע</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
  :root{
    --bg:#e7eef7; --panel:#ffffff; --ink:#1d2733; --muted:#6b7787;
    --line:#dde5ef; --line2:#cbd5e2;
    --info:#e9f1fb; --info-bd:#bcd4ef; --info-tx:#1d4e86;
    --ops:#fbe9e6; --ops-bd:#f0c4bb; --ops-tx:#9c4231;
    --ok:#fff6cf; --ok-bd:#ecd97a; --ok-tx:#7a5e10;
    --green:#2e7d57; --green-bg:#e4f3ea;
    --gray:#7a8696; --gray-bg:#eceff3;
    --amber:#a86b16; --amber-bg:#fbf0db;
    --brand:#1e5b9c; --brand-soft:#e8f0f9; --brand-ink:#16456f;
    --radius:14px; --shadow:0 1px 2px rgba(20,40,70,.06),0 8px 24px rgba(20,40,70,.07);
  }
  body.kamilion{ --brand:#6b3fa0; --brand-soft:#f1eafb; --brand-ink:#4f2c79; --bg:#f3edfa; --line:#e7ddf2; --line2:#ddcfee; }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  :root{color-scheme:light}
  html{background:var(--bg)}
  body{
    font-family:'Assistant','Heebo','Rubik','Segoe UI',system-ui,-apple-system,Arial,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased;
    font-size:15px; line-height:1.5;
  }
  button{font-family:inherit}
  .app{max-width:1080px;margin:0 auto;padding:0 16px 64px}

  header.bar{
    position:static;background:#eef1f5;
    border-bottom:1px solid var(--line);
    margin:0 -16px 22px; padding:12px 16px;
  }
  body.locked header.bar{display:none}
  .bar-in{max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;letter-spacing:-.2px}
  .logo .dot{width:14px;height:14px;border-radius:5px;background:var(--brand);box-shadow:0 0 0 4px var(--brand-soft)}
  .conn{font-size:11.5px;font-weight:800;color:var(--gray);background:#fff;border:1px solid var(--line2);padding:5px 10px;border-radius:999px;white-space:nowrap}
  .conn.on{color:var(--green);background:var(--green-bg);border-color:#bfe0cc}
  .spacer{flex:1}
  .brand-switch{display:flex;background:#fff;border:1px solid var(--line2);border-radius:11px;padding:3px;gap:2px}
  .brand-switch button{border:0;background:transparent;padding:7px 14px;border-radius:8px;cursor:pointer;font-weight:700;color:var(--muted);font-size:13.5px;display:flex;align-items:center;gap:7px}
  .brand-switch button .chip{width:10px;height:10px;border-radius:50%}
  .brand-switch button.on{background:var(--brand);color:#fff}
  .brand-switch button.on .chip{background:#fff}
  .nav{display:flex;gap:4px;background:#fff;border:1px solid var(--line2);border-radius:11px;padding:3px}
  .nav button{border:0;background:transparent;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:700;color:var(--muted);font-size:14px}
  .nav button.on{background:var(--ink);color:#fff}

  .btn{border:1px solid var(--line2);background:#fff;color:var(--ink);padding:10px 18px;border-radius:10px;font-weight:700;cursor:pointer;font-size:14px;display:inline-flex;align-items:center;gap:8px;transition:.12s}
  .btn:hover{border-color:var(--brand);color:var(--brand-ink)}
  .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
  .btn.primary:hover{filter:brightness(1.06)}
  .btn.pdf{background:#b3331f;border-color:#b3331f;color:#fff}
  .btn.pdf:hover{filter:brightness(1.07)}
  .btn.sent{background:#1f8a4c;border-color:#1f8a4c;color:#fff}
  .btn.sent:hover{filter:brightness(1.07);border-color:#1f8a4c;color:#fff}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--muted)}
  .btn.ghost:hover{background:#fff;color:var(--ink)}
  .btn.sm{padding:7px 12px;font-size:13px}

  /* gate */
  .gate{min-height:72vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .gate-card{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:34px 30px;width:300px;text-align:center}
  .gate-card .g-dot{width:18px;height:18px;border-radius:6px;background:var(--brand);box-shadow:0 0 0 6px var(--brand-soft);margin:0 auto 14px}
  .gate-card .g-dot.pulse{animation:gpulse 1s ease-in-out infinite}
  @keyframes gpulse{0%,100%{transform:scale(1);box-shadow:0 0 0 6px var(--brand-soft)}50%{transform:scale(1.18);box-shadow:0 0 0 11px var(--brand-soft)}}
  .gate-card h2{margin:0 0 4px;font-size:19px}
  .gate-card p{margin:0 0 16px;color:var(--muted);font-size:13.5px}
  .gate-card input{width:100%;border:1px solid var(--line2);border-radius:10px;padding:11px;text-align:center;font-size:16px;letter-spacing:3px;margin-bottom:12px;font-family:inherit}
  .gate-card input:focus{outline:0;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  .gate-card .btn{width:100%;justify-content:center}
  .g-err{color:#c0392b;font-size:13px;font-weight:700;margin-top:10px;min-height:16px}

  h1.page{font-size:22px;font-weight:800;margin:4px 0 2px;letter-spacing:-.3px}
  .sub{color:var(--muted);margin:0 0 22px;font-size:14px}
  .pick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
  .pick-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px 18px;cursor:pointer;text-align:right;box-shadow:var(--shadow);transition:.15s;position:relative;overflow:hidden}
  .pick-card:hover{transform:translateY(-2px);border-color:var(--brand)}
  .pick-card .ic{font-size:26px}
  .pick-card h3{margin:10px 0 4px;font-size:17px;font-weight:800}
  .pick-card p{margin:0;color:var(--muted);font-size:13px}
  .pick-card .edge{position:absolute;inset-block:0;inset-inline-end:0;width:5px;background:var(--brand)}

  .form-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px}
  .form-head .title{font-size:21px;font-weight:800}
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;padding:5px 11px;border-radius:999px}
  .badge .chip{width:9px;height:9px;border-radius:50%}
  .badge.brand{background:var(--brand-soft);color:var(--brand-ink)}
  .badge.brand .chip{background:var(--brand)}
  .badge.type{background:#eef1f5;color:#445}
  .statusbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:#fff;border:1px solid var(--line2);border-radius:14px;padding:12px 14px;margin-bottom:16px}
  .sb-spacer{flex:1}
  .status-big{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .status-big .sb-label{font-weight:800;color:var(--ink);font-size:14px}
  .status-big button{border:1.5px solid var(--line2);background:#fff;padding:10px 16px;border-radius:10px;cursor:pointer;font-weight:800;font-size:14px;color:var(--muted)}
  .status-big button.on{box-shadow:0 2px 9px rgba(0,0,0,.13);transform:scale(1.03)}
  .status-big button.on.draft{background:var(--gray-bg);color:#334;border-color:#cdd5df}
  .status-big button.on.filled{background:var(--amber-bg);color:var(--amber);border-color:var(--amber)}
  .status-big button.on.confirmed{background:var(--green-bg);color:var(--green);border-color:var(--green)}

  .section{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px}
  .sec-head{display:flex;align-items:center;gap:10px;padding:13px 18px;cursor:pointer;user-select:none;font-weight:800;font-size:15.5px;border-inline-start:5px solid var(--line2);border-top-left-radius:var(--radius);border-top-right-radius:var(--radius)}
  .sec-head .count{margin-inline-start:auto;font-size:12px;font-weight:700;color:var(--muted);background:#f1f4f8;padding:3px 9px;border-radius:999px}
  .sec-head .arr{margin-inline-start:auto;transition:.2s;color:var(--muted);font-size:13px}
  .section.collapsed .arr{transform:rotate(-90deg)}
  .section.collapsed .sec-body{display:none}
  .sec-head.info{background:var(--info);color:var(--info-tx);border-inline-start-color:var(--info-bd)}
  .sec-head.ops{background:var(--ops);color:var(--ops-tx);border-inline-start-color:var(--ops-bd)}
  .sec-head.ok{background:var(--ok);color:var(--ok-tx);border-inline-start-color:var(--ok-bd)}
  .sec-body{padding:16px 18px;display:grid;grid-template-columns:1fr 1fr;gap:13px 18px}
  @media(max-width:680px){.sec-body{grid-template-columns:1fr}}
  .field{display:flex;flex-direction:column;gap:5px}
  .field.full{grid-column:1/-1}
  .field label{font-size:13px;font-weight:700;color:#3a4654}
  .date-readout{display:flex;align-items:center;gap:8px;margin-top:7px;padding:8px 12px;background:var(--brand-soft);border:1.5px solid var(--brand);border-radius:10px;font-weight:800;font-size:16px;color:var(--brand);direction:rtl}
  .date-readout .dr-num{font-weight:900;letter-spacing:.3px}
  .date-readout.empty{background:#f3f5f8;border-color:var(--line2);color:var(--muted);font-weight:700}
  .date-readout .dr-ico{font-size:15px}
  .doc .d-meta .m-date{color:var(--brand);font-weight:900}
  .field .hint{font-size:11.5px;color:var(--muted);font-weight:600}
  .field input,.field textarea,.field select{width:100%;border:1px solid var(--line2);border-radius:9px;padding:10px 12px;font-size:16px;background:#fcfdfe;color:var(--ink);font-family:inherit}
  .field input:focus,.field textarea:focus,.field select:focus{outline:0;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft);background:#fff}
  .field textarea{resize:vertical;min-height:62px}
  .field textarea.big{min-height:172px;line-height:1.6}
  .yn-raw{font-size:12.5px;color:var(--amber);font-weight:700;margin-top:5px;white-space:pre-wrap}
  .viewmode .field input,.viewmode .field textarea,.viewmode .field select{pointer-events:none;background:#eef2f7;color:#3a4654}
  .viewmode .yesno button,.viewmode .ynn-btns button,.viewmode .cm-tab,.viewmode .cm-item,.viewmode .cm-opt,.viewmode .cr-op,.viewmode .cr-del,.viewmode .calc-add,.viewmode .calc-reset,.viewmode #statusPills button,.viewmode .convert-bar button,.viewmode .et-sel,.viewmode .et-other{pointer-events:none;opacity:.85}
  .view-banner{display:flex;align-items:center;gap:10px;background:#fff7e6;border:1px solid #f0d488;color:#7a5a10;border-radius:11px;padding:10px 13px;margin-bottom:12px;font-weight:700;font-size:13.5px}
  .view-banner .mini-edit{margin-inline-start:auto;background:var(--brand);color:#fff;border:0;border-radius:8px;padding:8px 14px;font-weight:800;cursor:pointer;font-size:13px;white-space:nowrap}
  .seg{display:inline-flex;border:1px solid var(--line2);border-radius:10px;overflow:hidden;background:#fff}
  .seg button{border:0;background:#fff;padding:9px 14px;font-weight:700;font-size:13.5px;cursor:pointer;color:var(--muted)}
  .seg button.on{background:var(--brand);color:#fff}
  .sched-sec{font-weight:800;color:var(--brand-ink);margin:16px 2px 9px;font-size:14.5px}
  .sched-sec.muted{color:var(--muted)}
  .sched-mhead{display:flex;align-items:center;gap:8px;cursor:pointer}
  .sched-mhead .sec-count{font-size:12px;font-weight:700;color:var(--muted);background:#fff;border:1px solid var(--line);padding:1px 9px;border-radius:999px}
  .sched-mhead .sec-collapse{margin-inline-start:auto;border:1px solid var(--line2);background:#fff;border-radius:8px;font-size:13px;font-weight:800;padding:3px 12px;cursor:pointer;color:var(--muted);line-height:1;transition:.12s}
  .sched-mhead .sec-collapse:hover{border-color:var(--brand);color:var(--brand)}
  .sched-mgroup.collapsed .sched-mcards{display:none}
  .sched-mgroup.collapsed .sec-collapse{transform:rotate(-90deg)}
  .srow{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 13px;margin-bottom:8px;cursor:pointer;box-shadow:var(--shadow)}
  .srow .date{flex:none;width:46px;text-align:center;font-weight:800;font-size:20px;line-height:1;color:var(--brand-ink)}
  .srow .date small{display:block;font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
  .srow .who{flex:1;min-width:0}
  .srow .who .nm{font-weight:700}
  .srow .who .meta{font-size:12.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cal-nav{display:flex;align-items:center;gap:8px;margin:6px 0 12px}
  .cal-title{font-weight:800;font-size:16px;flex:1;text-align:center}
  .btn.sm{padding:6px 11px;font-size:13px}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .cal-dow{text-align:center;font-weight:700;color:var(--muted);font-size:12px;padding:3px 0}
  .cal-cell{min-height:64px;border:1px solid var(--line);border-radius:9px;padding:4px;background:var(--panel);cursor:pointer;overflow:hidden}
  .cal-cell.empty{border:0;background:transparent;cursor:default}
  .cal-cell.today{border-color:var(--brand);box-shadow:0 0 0 2px var(--brand-soft)}
  .cal-d{font-size:12px;font-weight:700;color:var(--muted)}
  .cal-chip{font-size:10.5px;background:var(--brand-soft);color:var(--brand-ink);border-radius:5px;padding:2px 4px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700}
  .dj-banner{background:var(--brand-soft);border:1px solid var(--line2);color:var(--brand-ink);border-radius:11px;padding:11px 14px;margin-bottom:13px;font-weight:700;font-size:14.5px}
  .modal-bg{position:fixed;inset:0;background:rgba(15,22,32,.46);display:flex;align-items:center;justify-content:center;z-index:80;padding:16px;overscroll-behavior:contain}
  body.modal-open{position:fixed;left:0;right:0;width:100%;overflow:hidden}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:430px;max-height:92vh;overflow:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:18px 18px 20px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal-h{font-weight:800;font-size:18px;margin-bottom:6px}
  .modal label{display:block;font-weight:700;font-size:13px;margin:11px 2px 5px;color:var(--ink)}
  .modal input,.modal select,.modal textarea{width:100%;border:1px solid var(--line2);border-radius:9px;padding:11px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink)}
  .modal textarea{min-height:64px;resize:vertical}
  .modal-foot{display:flex;gap:9px;margin-top:18px;flex-wrap:wrap}
  .modal-foot .btn{flex:1;min-width:90px}
  .rubric-tabs{display:flex;gap:8px;margin:4px 0 16px;flex-wrap:wrap}
  .rubric-tabs button{border:1px solid var(--line2);background:#fff;border-radius:11px;padding:10px 15px;font-weight:800;font-size:14px;cursor:pointer;color:var(--muted)}
  .rubric-tabs button.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .srow a.btn,.modal a.btn{display:inline-flex;align-items:center;text-decoration:none}
  .wempty{color:var(--muted);font-size:13px;padding:2px 4px 9px}
  .cat-head{display:grid;grid-template-columns:62px 1fr 1fr 26px;gap:8px;font-weight:800;color:var(--muted);font-size:12.5px;padding:0 12px 6px}
  .crow2{display:grid;grid-template-columns:62px 1fr 1fr 26px;gap:8px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:7px;cursor:pointer;font-size:14px}
  .crow2 .cdate{font-weight:800;color:var(--brand-ink)}
  .crow2 .cstat{font-size:16px;text-align:center}
  .crow2.ok{border-color:#9cd3ab;background:#f1faf4}
  .crow2.bad{border-color:#e6b3aa;background:#fdf1ef}
  .chk-row{display:flex;gap:20px;margin-top:12px}
  .chk{display:flex;align-items:center;gap:7px;font-weight:700;font-size:14px;cursor:pointer}
  .chk input{width:20px;height:20px;accent-color:var(--brand)}
  .xtab tr.mrow td{background:#e7edf5;color:#2b3a4d;font-weight:800;font-size:13px;padding:7px 10px;border-bottom:1px solid var(--line2);text-align:right}
  body.kamilion .xtab tr.mrow td{background:#efe7f7}
  .xtab tr.mrow{cursor:default}
  .xtab tr.needrow{background:#fdf2f0}
  .xtab tr.needrow:hover{background:#fbe7e3}
  .needtag{display:inline-block;background:#e23b2e;color:#fff;border-radius:5px;padding:1px 7px;font-size:10.5px;font-weight:800;margin-inline-start:6px;vertical-align:middle}
  .cal-chip.need{background:#fde2de;color:#b3261e}
  .sched-card{display:flex;gap:12px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:11px 13px;margin-bottom:9px;cursor:pointer;box-shadow:var(--shadow);transition:.12s}
  .sched-card:hover{border-color:var(--brand);transform:translateY(-1px)}
  .sched-card.need{border-inline-start:5px solid #e23b2e;background:#fdf5f4}
  .sched-card.done{border-inline-start:5px solid #1f9d57;background:#f3faf5}
  @media(max-width:680px){ .sched-card.need{border-inline-start:3px solid #e0837a} }
  .sched-card.done .sc-date{background:#e7f6ec;border-color:#1f9d57;color:#137a40}
  .sched-card.done .sc-date .scd-dow{color:#1f9d57}
  .sched-card.done .sc-date .scd-mon{color:#4ea676}
  .sched-card .sc-date{flex:none;width:62px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;background:var(--brand-soft);border:1.5px solid var(--brand);border-radius:12px;padding:7px 4px;color:var(--brand-ink)}
  .sched-card .sc-date .scd-dow{font-size:11.5px;font-weight:800;color:var(--brand);letter-spacing:.3px}
  .sched-card .sc-date .scd-day{font-size:26px;font-weight:800;line-height:1}
  .sched-card .sc-date .scd-mon{font-size:11.5px;font-weight:700;color:var(--muted)}
  .sched-card.need .sc-date{background:#fde6e3;border-color:#e23b2e;color:#b3261e}
  .sched-card.need .sc-date .scd-dow{color:#e23b2e}
  .sched-card.need .sc-date .scd-mon{color:#c2564a}
  .sc-body{flex:1;min-width:0}
  .sc-title{font-weight:800;font-size:15px;margin-bottom:6px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .sc-manual{font-size:10.5px;font-weight:800;background:#eef1f5;color:#5a6675;border-radius:5px;padding:2px 7px}
  .sc-roles{display:flex;flex-direction:column;gap:4px;font-size:13.5px}
  .sc-role b{color:var(--muted);font-weight:700;margin-inline-end:3px}
  .sc-role .val{font-weight:800;color:#1f2a36;font-size:15.5px}
  .sc-role .need{font-weight:800;color:#e23b2e}
  .sc-need{border:1px solid #f0bcb4;background:#fdecea;color:#e23b2e;font-weight:800;font-size:12.5px;border-radius:8px;padding:3px 11px;cursor:pointer}
  .sc-need:hover{background:#e23b2e;color:#fff;border-color:#e23b2e}
  .sc-none{font-weight:700;font-size:12.5px;color:var(--muted);background:var(--gray-bg);border:1px solid #d8dee6;border-radius:8px;padding:3px 10px;cursor:pointer}
  .sc-skip{font-weight:700;font-size:12.5px;color:var(--muted);background:#fff;border:1px solid var(--line2);border-radius:8px;padding:3px 10px;cursor:pointer;margin-inline-start:6px}
  .sc-skip:hover{border-color:#9aa6b3}
  .sc-go{flex:none;color:var(--line2);font-size:22px;font-weight:800}
  .yesno{display:flex;gap:6px}
  .yesno button{flex:1;border:1px solid var(--line2);background:#fcfdfe;border-radius:9px;padding:9px;cursor:pointer;font-weight:700;font-size:13.5px;color:var(--muted)}
  .yesno button.on.yes{background:var(--green-bg);border-color:#bfe0cc;color:var(--green)}
  .yesno button.on.no{background:#fdeceb;border-color:#f1c9c4;color:#b3331f}
  .yesno button.on.na{background:var(--gray-bg);border-color:var(--line2);color:#566}
  .imgfield{display:flex;flex-direction:column;gap:9px}

<script>
/* ===== עדכון אוטומטי לגרסה האחרונה (פותר תקיעת קאש במסך הבית של iOS) ===== */
const APP_VERSION = 'v150';
(function(){
  try{ if(sessionStorage.getItem('__verChecked')==='1') return; }catch(e){}
  var base = location.origin + location.pathname;
  fetch(base + '?_v=' + Date.now(), {cache:'no-store'})
    .then(function(r){ return r.ok ? r.text() : null; })
    .then(function(html){
      try{ sessionStorage.setItem('__verChecked','1'); }catch(e){}
      if(!html) return;
      var m = html.match(/>v(\d+)<\/small>/);
      if(!m) return;
      var remote = parseInt(m[1],10);
      var local  = parseInt((APP_VERSION.match(/(\d+)/)||[0,0])[1],10);
      if(remote > local){ location.replace(base + '?v=' + remote); }
    })
    .catch(function(){});
})();
/* ============================================================== */
/*  הגדרות — מלא/י כאן את פרטי ה-Firebase שלך (ראה המדריך המצורף)   */
/*  כל עוד נשאר "PASTE" — המערכת עובדת במצב מקומי לבדיקה.            */

async function initCloud(){
  if(!cloudConfigured() || typeof firebase==='undefined') return false;
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    fb.db=firebase.firestore();

function repInWin(r){ const c=histCutoff(); const d=r&&r.fields&&r.fields.eventDate; return !!(d&&d>=c); }
function rowInWin(r){ const c=histCutoff(); const d=r&&r.date; return !!(d&&d>=c); }
function mergeWin(key,recent,inWin){ const older=MEM[key].filter(x=>!inWin(x)); MEM[key]=older.concat(recent); }
function afterCloudSync(){ if(typeof refreshBell==='function') refreshBell(); if(typeof maybeAutoPopReminders==='function') setTimeout(maybeAutoPopReminders,200); if(CHEF_MODE||VIEW==='chef'){ renderChef(); return; } if(VIEW==='archive'){ const q=$('#searchBox'); buildTree(q?q.value.trim():''); } else if(VIEW==='endreport' && document.querySelector('.end-wrap')) renderEndHome(); else if(VIEW==='sched' && modalsClosed()) renderSched(); }
async function loadHistory(){
  if(HIST_LOADED) return true;
  if(CLOUD && fb.db){
    try{
      const s=await fb.db.collection('reports').get(); const mR=new Map(MEM.reports.map(r=>[r.id,r])); s.docs.map(d=>d.data()).forEach(r=>mR.set(r.id,r)); MEM.reports=[...mR.values()];
      const sa=await fb.db.collection('assignments').get(); const mA=new Map(MEM.assignments.map(r=>[r.id,r])); sa.docs.map(d=>d.data()).forEach(r=>mA.set(r.id,r)); MEM.assignments=[...mA.values()];
      const sc=await fb.db.collection('catering').get(); const mC=new Map(MEM.catering.map(r=>[r.id,r])); sc.docs.map(d=>d.data()).forEach(r=>mC.set(r.id,r)); MEM.catering=[...mC.values()];
    }catch(e){ console.warn('loadHistory',e); toast('טעינת ההיסטוריה נכשלה'); return false; }
  }
  HIST_LOADED=true; return true;
}
async function dbLoad(){
  if(MEM) return MEM; MEM={reports:[],assignments:[],workers:[],catering:[],tastings:[]};
  if(CLOUD && fb.db){
    const cutoff=histCutoff();
    try{ const s=await fb.db.collection('reports').where('fields.eventDate','>=',cutoff).get(); MEM.reports=s.docs.map(d=>d.data()); }
    catch(e){ console.warn('rep window, full load',e); try{ const s=await fb.db.collection('reports').get(); MEM.reports=s.docs.map(d=>d.data()); HIST_LOADED=true; }catch(_){} }
    try{ const sa=await fb.db.collection('assignments').where('date','>=',cutoff).get(); MEM.assignments=sa.docs.map(d=>d.data()); }
    catch(e){ try{ const sa=await fb.db.collection('assignments').get(); MEM.assignments=sa.docs.map(d=>d.data()); }catch(_){} }
    try{ const sw=await fb.db.collection('workers').get(); MEM.workers=sw.docs.map(d=>d.data()); }
    catch(e){ console.warn(e); }
    try{ const st=await fb.db.collection('tastings').get(); MEM.tastings=st.docs.map(d=>d.data()); }
    catch(e){ console.warn(e); }
    try{ const sc=await fb.db.collection('catering').where('date','>=',cutoff).get(); MEM.catering=sc.docs.map(d=>d.data()); }
    catch(e){ try{ const sc=await fb.db.collection('catering').get(); MEM.catering=sc.docs.map(d=>d.data()); }catch(_){} }
  } else {
    try{
      if(window.storage){ let r=null; try{r=await window.storage.get(KEY);}catch(_){r=null;} MEM = r&&r.value?JSON.parse(r.value):{reports:[]}; }
      else { usingMemoryOnly=true; }
    }catch(e){ usingMemoryOnly=true; }
  }
  if(!MEM.reports) MEM.reports=[];
  if(!MEM.assignments) MEM.assignments=[];
  if(!MEM.workers) MEM.workers=[];
  if(!MEM.catering) MEM.catering=[];
  if(!MEM.tastings) MEM.tastings=[];
  return MEM;
}
async function persist(report){
  if(CLOUD && fb.db){
    try{ await fb.db.collection('reports').doc(report.id).set(JSON.parse(JSON.stringify(report))); }
    catch(e){ console.warn(e); toast('שמירה לענן נכשלה ('+((e&&(e.code||e.message))||'?')+') — נשמר מקומית'); usingMemoryOnly=true; }
  } else {
    try{ if(window.storage) await window.storage.set(KEY, JSON.stringify(MEM)); else usingMemoryOnly=true; }
    catch(e){ usingMemoryOnly=true; }
  }
}

let _seedTried=false;
async function seedSuppliersOnce(){
  if(_seedTried) return; if(!CLOUD || !fb.db || !MEM) return;
  _seedTried=true;
  try{
    let done=false;
    try{ const meta=await fb.db.collection('meta').doc('seedSuppliers_v1').get(); done=!!(meta&&meta.exists); }catch(e){}
    if(!done){ try{ if(window.storage){ const f=await window.storage.get('seedSuppliers_v1'); done=!!(f&&f.value); } }catch(e){} }
    if(done) return;
    const SEED=[
      {n:'רותם', role:'manager',      p:'054-4450469'},
      {n:'אורי', role:'dj',           p:'052-3907187'},
      {n:'מוש',  role:'dj',           p:'052-8977933'},
      {n:'ניב',  role:'dj',           p:'054-9182131'},
      {n:'ליאל', role:'dj',           p:'050-4488384'},
      {n:'אולג', role:'photographer', p:'054-8968085'}
    ];
    const have=(MEM.workers||[]).map(w=>String(w.phone||'').replace(/\D/g,''));
    let added=0;
    for(const s of SEED){
      const digits=String(s.p).replace(/\D/g,'');
      if(have.indexOf(digits)>=0) continue;
      const w={id:'seed_'+digits,name:s.n,role:s.role,phone:s.p,contract:false,form101:false,form101url:'',notes:'יובא מרשימת ספקים',createdAt:Date.now(),updatedAt:Date.now()};
      MEM.workers.push(w); added++;
      try{ await fb.db.collection('workers').doc(w.id).set(JSON.parse(JSON.stringify(w))); }catch(e){ console.warn('seed worker',e); }
    }
    try{ await fb.db.collection('meta').doc('seedSuppliers_v1').set({done:true,at:Date.now(),added}); }catch(e){}
    try{ if(window.storage) await window.storage.set('seedSuppliers_v1','1'); }catch(e){}
    if(added){ if(typeof toast==='function') toast('נוספו '+added+' ספקים מהרשימה ✓'); if(typeof afterCloudSync==='function') afterCloudSync(); }
  }catch(e){ console.warn('seedSuppliers',e); _seedTried=false; }
}
function subscribeCloud(){
  if(!CLOUD || !fb.db) return;
  const cutoff=histCutoff();
  fb.db.collection('reports').where('fields.eventDate','>=',cutoff).onSnapshot(snap=>{
    mergeWin('reports', snap.docs.map(d=>d.data()), repInWin); afterCloudSync();
  }, err=>{ console.warn('snapshot',err); fb.db.collection('reports').onSnapshot(s=>{ MEM.reports=s.docs.map(d=>d.data()); HIST_LOADED=true; afterCloudSync(); }, e2=>console.warn(e2)); });
  fb.db.collection('assignments').where('date','>=',cutoff).onSnapshot(snap=>{
    mergeWin('assignments', snap.docs.map(d=>d.data()), rowInWin); afterCloudSync();
  }, err=>{ console.warn('snapshot a',err); fb.db.collection('assignments').onSnapshot(s=>{ MEM.assignments=s.docs.map(d=>d.data()); afterCloudSync(); }, e2=>console.warn(e2)); });
  fb.db.collection('workers').onSnapshot(snap=>{
    MEM.workers=snap.docs.map(d=>d.data()); afterCloudSync(); seedSuppliersOnce();
  }, err=>console.warn('snapshot w',err));
  fb.db.collection('tastings').onSnapshot(snap=>{
    MEM.tastings=snap.docs.map(d=>d.data()); afterCloudSync();
  }, err=>console.warn('snapshot t',err));
  fb.db.collection('catering').where('date','>=',cutoff).onSnapshot(snap=>{
    mergeWin('catering', snap.docs.map(d=>d.data()), rowInWin); afterCloudSync();
  }, err=>{ console.warn('snapshot c',err); fb.db.collection('catering').onSnapshot(s=>{ MEM.catering=s.docs.map(d=>d.data()); afterCloudSync(); }, e2=>console.warn(e2)); });
}

function welcomeDefaults(){ return (current&&current.type==='shulchan')?WELCOME_MSG_ADULTS:WELCOME_MSG; }
function getWelcomeMsg(){ const f=current.fields; if(f.welcomeMsg!=null && String(f.welcomeMsg).trim()!=='') return f.welcomeMsg; const src=welcomeDefaults(); return src[current.brand]||src.louie; }
function waNum(raw){ let num=String(raw||'').replace(/\D/g,''); if(num){ if(num.indexOf('972')===0){} else if(num.charAt(0)==='0'){ num='972'+num.slice(1); } else if(num.length===9&&num.charAt(0)==='5'){ num='972'+num; } } return num; }
function welcomeCardHTML(){
  const f=current.fields; const sent=!!f.welcomeSent; const msg=getWelcomeMsg();
  const preview=esc(msg.replace(/\s+/g,' ').slice(0,150))+'…';
  const when=f.welcomeSentAt?(' · '+new Date(f.welcomeSentAt).toLocaleDateString('he-IL')):'';
  return `<div class="welcome-card${sent?' sent':''}" id="welcomeCard">
    <div class="wc-head"><span class="wc-title">📩 הודעת פתיחה ללקוח <span class="hint">(נשלחת אחרי סגירת האירוע)</span></span>
      <span class="wc-status">${sent?('✓ נשלחה'+when):'○ טרם נשלחה'}</span></div>
    <div class="wc-preview">${preview}</div>
    <div class="wc-actions">
      <button class="btn wc-wa" id="wcSend">📲 שליחה בוואטסאפ ללקוח</button>
      <button class="btn ghost" id="wcEdit">✏️ עריכת הנוסח</button>
      ${sent?'<button class="btn ghost" id="wcUnsend">בטל סימון נשלח</button>':''}
    </div>
    <div class="wc-note">${f.phone?('יישלח אל המספר שבדוח: '+esc(f.phone)):'⚠ אין מספר בשדה הטלפון — מלא/י אותו תחילה'}</div>
  </div>`;
}
async function saveWelcomeState(){
  current.updatedAt=Date.now();
  const i=MEM.reports.findIndex(r=>r.id===current.id); if(i>=0) MEM.reports[i]=current; else MEM.reports.push(current);
  try{ await persist(current); }catch(e){}
}
async function sendWelcome(){
  const f=current.fields; const num=waNum(f.phone); const msg=getWelcomeMsg();
  try{ if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(msg); }catch(e){}
  if(!num){ toast('אין מספר טלפון בדוח — מלא/י את שדה הטלפון'); return; }
  const url='https://wa.me/'+num+'?text='+encodeURIComponent(msg);
  let opened=false; try{ const a=document.createElement('a'); a.href=url; a.target='_blank'; a.rel='noopener'; document.body.appendChild(a); a.click(); document.body.removeChild(a); opened=true; }catch(e){}
  if(!opened){ try{ window.location.href=url; }catch(e){} }
  f.welcomeSent=true; f.welcomeSentAt=Date.now(); await saveWelcomeState();
  const c=$('#welcomeCard'); if(c){ c.outerHTML=welcomeCardHTML(); bindWelcome(); }
  toast('פותח וואטסאפ — ההודעה מוכנה לשליחה ✓');
}
async function unsendWelcome(){
  const f=current.fields; f.welcomeSent=false; f.welcomeSentAt=null; await saveWelcomeState();
  const c=$('#welcomeCard'); if(c){ c.outerHTML=welcomeCardHTML(); bindWelcome(); }
  toast('הסימון בוטל');
}
function openWelcomeEdit(){
  const m=$('#welcomeModal'),t=$('#welcomeField'); if(!m||!t){ return; }
  t.value=getWelcomeMsg(); m.style.display='flex'; setTimeout(()=>{try{t.focus();}catch(e){}},60);
  const ok=$('#welcomeOk'),no=$('#welcomeCancel'),rs=$('#welcomeReset');
  const close=()=>{ m.style.display='none'; ok.onclick=null;no.onclick=null;rs.onclick=null;m.onclick=null; };
  ok.onclick=async()=>{ current.fields.welcomeMsg=t.value; await saveWelcomeState(); markDirty(); close(); const c=$('#welcomeCard'); if(c){ c.outerHTML=welcomeCardHTML(); bindWelcome(); } toast('הנוסח נשמר ✓'); };
  no.onclick=()=>close();
  rs.onclick=()=>{ const src=welcomeDefaults(); t.value=src[current.brand]||src.louie; };
  m.onclick=(e)=>{ if(e.target===m) close(); };
}
function bindWelcome(){ const s=$('#wcSend'); if(s) s.onclick=sendWelcome; const e=$('#wcEdit'); if(e) e.onclick=openWelcomeEdit; const u=$('#wcUnsend'); if(u) u.onclick=unsendWelcome; }

function askInput(title,cur){

function calcCompute(rows){

  (rows||[]).forEach(r=>{
    const n=parseFloat(String(r.amt==null?'':r.amt).replace(/,/g,'')); const op=r.op||'+';

    }
    runs.push(total);
  });
  return {total:total,runs:runs};
}

function compressImage(file, cb){
  const r=new FileReader();
  r.onload=()=>{ const img=new Image(); img.onload=()=>{
    const max=1280; let w=img.width,h=img.height;
    if(w>h){ if(w>max){ h=Math.round(h*max/w); w=max; } } else { if(h>max){ w=Math.round(w*max/h); h=max; } }
    const c=document.createElement('canvas'); c.width=w; c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    let q=0.6, out=c.toDataURL('image/jpeg',q);
    while(out.length>900000 && q>0.3){ q-=0.1; out=c.toDataURL('image/jpeg',q); }
    if(out.length>1100000){ toast('הצילום גדול מדי — נסה/י צילום קטן יותר'); return; }
    cb(out);
  }; img.onerror=()=>toast('שגיאה בטעינת התמונה'); img.src=r.result; };
  r.onerror=()=>toast('שגיאה בקריאת הקובץ');
  r.readAsDataURL(file);
}

let dirty=false;
function computeStatus(){
  if(!current) return 'draft';
  const f=current.fields||{};
  if(f.clientApproved==='yes') return 'confirmed';
  const def=EVENT_TYPES[current.type]; let allReq=true;
  if(def) def.sections.forEach(sec=>sec.fields.forEach(fld=>{ if(fld.req && depActive(fld)){ const v=f[fld.key]; if(v==null||String(v).trim()==='') allReq=false; } }));
  return allReq?'filled':'draft';
}
function updateStatus(){
  if(!current) return; current.status=computeStatus();
  const el=$('#statusBadge'); if(el){ el.textContent=STATUS_NAME[current.status]; el.className='status-auto '+current.status; }
  const h=document.querySelector('#statusPills .hint'); if(h) h.textContent=(current.status==='draft')?'התחילו למלא · טרם הושלם':'מתעדכן אוטומטית';
}
function markDirty(){ dirty=true; updateStatus(); const n=$('#saveNote'); if(n) n.textContent='יש שינויים שלא נשמרו'; }

function validateRequired(){
  const def=EVENT_TYPES[current.type]; const missing=[];
  document.querySelectorAll('.field.missing').forEach(e=>e.classList.remove('missing'));
  def.sections.forEach(sec=>sec.fields.forEach(fld=>{
    if(!depActive(fld)) return;
    if(fld.type==='checks'){
      const sel=Array.isArray(current.fields[fld.key])?current.fields[fld.key]:[];
      const ok=sel.indexOf('__none__')>=0 || sel.length>=(fld.min||3);
      if(!ok){ missing.push(fld.label+' (לפחות '+(fld.min||3)+' או "ללא")'); const el=document.querySelector('[data-key="'+fld.key+'"]'); if(el){ const fc=el.closest('.field'); if(fc) fc.classList.add('missing'); } }
      return;
    }
    if(!fld.req) return;
    if(!depActive(fld)) return;
    const val=current.fields[fld.key];
    if(val==null||String(val).trim()===''){ missing.push(fld.label); const el=document.querySelector('[data-key="'+fld.key+'"]'); if(el){ const fc=el.closest('.field'); if(fc) fc.classList.add('missing'); } }
  }));
  return missing;
}
async function saveReport(showToast){
  if(showToast){ const miss=validateRequired(); if(miss.length){ toast('יש להשלים שדות חובה: '+miss.join(', ')); const fst=document.querySelector('.field.missing'); if(fst) fst.scrollIntoView({behavior:'smooth',block:'center'}); return; } }
  current.updatedAt=Date.now();
  const i=MEM.reports.findIndex(r=>r.id===current.id);
  if(i>=0) MEM.reports[i]=current; else MEM.reports.push(current);
  await persist(current);

  const n=$('#saveNote'); if(n) n.textContent='נשמר '+new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})+(CLOUD?' · בענן':'');

    const folder=current.fields.eventDate?(MONTHS[(new Date(current.fields.eventDate+'T00:00')).getMonth()]+' '+(new Date(current.fields.eventDate+'T00:00')).getFullYear()):'ללא תאריך';

}

function buildTree(q,autoScroll){
  const tree=$('#tree'); if(!tree) return;

    const ql=q.toLowerCase();
    const nq=ql.replace(/[.\-]/g,'/').replace(/\s+/g,'');
    const norm=s=>String(s).toLowerCase().replace(/[.\-]/g,'/').replace(/\s+/g,'');
    const dateNeedles=iso=>{ const m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(iso||''); if(!m) return iso?[iso]:[]; const y=m[1],mo=m[2],da=m[3],d=String(+da),mn=String(+mo); const out=[iso,da+'/'+mo,d+'/'+mn,da+'/'+mo+'/'+y,d+'/'+mn+'/'+y,d+'/'+mn+'/'+y.slice(2)]; try{out.push(fmtDateLong(iso));}catch(e){} return out; };

      if([f.celebrant,f.contact,f.phone,EVENT_TYPES[r.type]?.name,f.eventKind].some(x=>x&&String(x).toLowerCase().includes(ql))) return true;
      return dateNeedles(f.eventDate).some(x=>norm(x).includes(nq));
    });
  }
  let olderCount=0;

    const cutoff=recentCutoffIso();
    list=list.filter(r=>{ const d=r.fields.eventDate; if(!d) return true; if(d>=cutoff) return true; olderCount++; return false; });
  }

/* ===================== תזכורות מנהלת המשרד ===================== */
function todayIsoStr(){ return new Date().toISOString().slice(0,10); }
function daysUntil(iso){
  if(!iso) return null;
  const t=new Date(todayIsoStr()+'T00:00'); const d=new Date(iso+'T00:00');
  if(isNaN(d.getTime())) return null;
  return Math.round((d-t)/86400000);
}
// "נלקח צ׳ק ביטחון" — נחשב שטופל אם כתוב כן / לא רלוונטי / יש / נלקח / הופקד / התקבל / קיבל
function securityTaken(v){
  const s=String(v==null?'':v).trim().toLowerCase();
  if(!s) return false;
  if(s==='yes'||s==='na'||s==='כן'||s==='לא רלוונטי') return true;
  if(/יש|נלקח|הופקד|התקבל|קיבל|נמסר|שולם/.test(s)) return true;
  return false; // כולל 'no','עד שבוע לפני','לעדכן' וכל ערך לא ודאי אחר
}
// בדיקת שלמות שיבוץ הצוות (מפעיל / DJ / צלם) לאירוע
function crewMissingFor(r){
  const a=(MEM.assignments||[]).find(x=>x.reportId===r.id) || (MEM.assignments||[]).find(x=>x.date===r.fields.eventDate&&x.brand===r.brand) || null;
  const op=(a&&a.op)||r.fields.operator||'';
  const dj=(a&&a.dj)||r.fields.dj||'';
  const ph=(a&&a.photog)||r.fields.photographer||'';
  return [op,dj,ph].some(v=>roleState(v)==='need');
}
// בדיקת שלמות הספקים (בדיקת קייטרינג — מול הלקוח ומול הקייטרינג)
function cateringMissingFor(r){
  const c=(MEM.catering||[]).find(x=>x.reportId===r.id) || (MEM.catering||[]).find(x=>x.date===r.fields.eventDate&&x.brand===r.brand) || null;
  return !(c && String(c.client||'').trim() && String(c.catering||'').trim());
}
// מרכז כל התזכורות הפעילות (משני המותגים) לפי כללי הזמן
function remDateTime(f){
  // תאריך מלא + יום בשבוע + שעה מדויקת
  let s=hebDateText(f.eventDate);
  if(f.eventTime && /^[0-9]/.test(String(f.eventTime).trim())) s+=' · בשעה '+String(f.eventTime).trim();
  return s;
}
function computeReminders(){
  const out=[]; if(!MEM||!MEM.reports) return out;
  MEM.reports.filter(r=>r.fields&&r.fields.eventDate&&r.type!=='endreport'&&r.brand===BRAND).forEach(r=>{
    const f=r.fields; const du=daysUntil(f.eventDate); if(du==null||du<0) return;
    const bname=BRAND_NAME[r.brand]||''; const et=(EVENT_TYPES[r.type]&&EVENT_TYPES[r.type].name)||'אירוע';
    const whoRaw=String(f.celebrant||f.contact||'').replace(/\s+/g,' ').trim();
    const who=whoRaw.length>32?(whoRaw.slice(0,32).trim()+'…'):whoRaw;
    const name=et+(who?(' · '+who):'')+' · '+bname; // זיהוי האירוע: סוג · שם · מותג
    const dt=remDateTime(f);
    const whenTxt=du===0?'היום':(du===1?'מחר':('בעוד '+du+' ימים'));
    // 1) ביום האירוע — לא נלקח צ׳ק ביטחון  (צ׳קים)
    if(du===0 && !securityTaken(f.securityCheck)){
      out.push({kind:'security',level:'red',clr:'red',grp:0,rid:r.id,brand:r.brand,sort:f.eventDate,ic:'🧾',
        problem:'לא נלקח צ׳ק ביטחון'+(f.securityCheck?(' (רשום: "'+String(f.securityCheck).trim()+'")'):''),
        name:name, datetime:dt, when:whenTxt, wlevel:'red'});
    }
    // 2) שבוע לפני — לא נבחר תפריט אוכל  (קייטרינג)
    if(du>=0 && du<=7 && !chefHasMenu(r)){
      out.push({kind:'menu',level:'amber',clr:'amber',grp:2,rid:r.id,brand:r.brand,sort:f.eventDate,ic:'🍽️',
        problem:'לא נבחר תפריט אוכל',
        name:name, datetime:dt, when:whenTxt, wlevel:(du<=1?'red':'amber')});
    }
    // 3) יום לפני — שיבוצים לא מלאים (צוות / ספקים) — מופרד לכל לשונית
    if(du>=0 && du<=1){
      if(crewMissingFor(r)){
        out.push({kind:'crew',level:'red',clr:'blue',grp:1,rid:r.id,brand:r.brand,sort:f.eventDate,ic:'👥',
          problem:'שיבוץ צוות חסר (מפעיל / DJ / צלם)',
          name:name, datetime:dt, tab:'assign', when:whenTxt, wlevel:'red'});
      }
      if(cateringMissingFor(r)){
        out.push({kind:'catering',level:'red',clr:'amber',grp:2,rid:r.id,brand:r.brand,sort:f.eventDate,ic:'🍴',
          problem:'בדיקת קייטרינג חסרה (מול לקוח / קייטרינג)',
          name:name, datetime:dt, tab:'catering', when:whenTxt, wlevel:'red'});
      }
    }
    // 4) כרטיס לקוח — עברו יומיים מפתיחת הכרטיס ועדיין לא נשלחה הודעת פתיחה ללקוח (ירוק)
    const openedDays = r.createdAt ? Math.floor((Date.now()-r.createdAt)/86400000) : null;
    if(!f.welcomeSent && openedDays!=null && openedDays>=2){
      out.push({kind:'welcome',level:'green',clr:'green',grp:3,rid:r.id,brand:r.brand,sort:f.eventDate,ic:'📩',
        problem:'לא נשלחה הודעת פתיחה ללקוח (נפתח לפני '+openedDays+' ימים)',
        name:name, datetime:dt, when:whenTxt, wlevel:'green'});
    }
  });
  const rank={red:0,amber:1,green:2};
  out.sort((a,b)=>((a.grp||0)-(b.grp||0)) || (rank[a.level]-rank[b.level]) || (a.sort||'').localeCompare(b.sort||''));
  return out;
}

    +'<span class="rem-ic">'+rm.ic+'</span>'

}

  $('#app').innerHTML=`<div class="gate"><div class="gate-card">
    <div class="g-dot"></div><h2>כניסה למערכת</h2><p>הזן/י את קוד הכניסה של המשרד</p>
    <input id="pcode" type="password" inputmode="numeric" placeholder="קוד כניסה" autocomplete="off">
    <button class="btn primary" id="pcBtn">כניסה</button><div class="g-err" id="gErr"></div>
  </div></div>`;
  const go=()=>{ const v=$('#pcode').value;
    if(v===APP_PASSCODE){ try{localStorage.setItem('louie_auth','1'); localStorage.setItem('louie_role','manager');}catch(e){} CHEF_MODE=false; startApp(); }
    else if(CHEF_PASSCODE && v===CHEF_PASSCODE){ try{localStorage.setItem('louie_auth','1'); localStorage.setItem('louie_role','chef');}catch(e){} CHEF_MODE=true; startApp(); }
    else $('#gErr').textContent='קוד שגוי'; };
  $('#pcBtn').onclick=go; $('#pcode').addEventListener('keydown',e=>{ if(e.key==='Enter') go(); }); $('#pcode').focus();
}
if(APP_PASSCODE){ let ok=false,role='manager'; try{ ok=localStorage.getItem('louie_auth')==='1'; role=localStorage.getItem('louie_role')||'manager'; }catch(e){} if(ok){ CHEF_MODE=(role==='chef'); startApp(); } else { document.body.classList.add('locked'); renderGate(); } } else { startApp(); }
</script>
</body>
</html>

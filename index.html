<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SalesPro CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Assistant','Rubik','Segoe UI',Arial,sans-serif;background:#f4f5f7;color:#2d3748;direction:rtl;font-size:13.5px;line-height:1.5}
:root{--L:#1B4FDE;--L50:#e8eeff;--K:#7C3AED;--K50:#f0ebff;--bd:#e5e7eb}

/* NAV */
.nav{background:#1a1a2e;height:44px;display:flex;align-items:center;padding:0 14px;position:sticky;top:0;z-index:100}
.nav-logo{color:#fff;font-weight:700;font-size:14px;margin-left:16px}
.nav-link{padding:0 12px;height:44px;display:flex;align-items:center;color:rgba(255,255,255,.6);font-size:12px;cursor:pointer;border-bottom:2px solid transparent}
.nav-link:hover{color:#fff}
.nav-link.on{color:#fff;border-bottom-color:#fff;font-weight:600}

/* LAYOUT */
.app{display:flex;height:calc(100vh - 44px)}
.sb{width:210px;background:#fff;border-left:1px solid var(--bd);flex-shrink:0;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid var(--bd);height:46px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0}
.page-title{font-size:14px;font-weight:700}
.content{flex:1;overflow-y:auto}

/* SIDEBAR */
.brand-sw{display:flex;margin:10px;border-radius:7px;overflow:hidden;border:1px solid var(--bd)}
.bsw{flex:1;padding:7px 0;font-size:12px;font-weight:700;cursor:pointer;border:none;background:transparent;color:#888;font-family:inherit;text-align:center}
.bsw.LA{background:var(--L);color:#fff}
.bsw.KA{background:var(--K);color:#fff}
.sb-sec{font-size:10px;color:#aaa;padding:10px 12px 3px;text-transform:uppercase;letter-spacing:.5px}
.sb-row{display:flex;align-items:center;gap:7px;padding:7px 12px;cursor:pointer;font-size:12px;color:#555;border-right:2px solid transparent}
.sb-row:hover{background:#f8f8f8}
.sb-row.ON-L{color:var(--L);border-right-color:var(--L);background:var(--L50);font-weight:700}
.sb-row.ON-K{color:var(--K);border-right-color:var(--K);background:var(--K50);font-weight:700}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cnt{font-size:10px;margin-right:auto;background:#eee;border-radius:10px;padding:1px 7px;color:#888}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 12px;text-align:right;font-weight:600;color:#777;border-bottom:2px solid var(--bd);background:#fafafa;position:sticky;top:0;z-index:2;white-space:nowrap}
.tbl td{padding:8px 12px;border-bottom:1px solid #f0f0f0}
.tbl tr:hover td{background:#f9faff;cursor:pointer}
.badge{padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700;display:inline-block}
.BN{background:#fef3c7;color:#b45309}.BM{background:#dbeafe;color:#1d4ed8}
.BD{background:#dcfce7;color:#15803d}.BL{background:var(--L50);color:var(--L)}
.BK{background:var(--K50);color:var(--K)}.BP{background:#f3e8ff;color:#7e22ce}

/* BUTTONS */
.btn{color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:700}
.btn:hover{opacity:.85}
.abt{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:5px;border:1px solid var(--bd);background:#fff;cursor:pointer;font-size:12px;color:#444;font-family:inherit;font-weight:600}
.abt:hover{background:#f0f0f0}
.lnk{color:var(--L);cursor:pointer;font-weight:600}
.lnk-k{color:var(--K);cursor:pointer;font-weight:600}

/* LEAD CARD */
.lc-top{background:#fff;border-bottom:1px solid var(--bd);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.lc-name{font-size:17px;font-weight:800}
.lc-fields{display:flex;align-items:center;gap:0}
.lc-fld{padding:0 14px;border-right:1px solid var(--bd);text-align:center}
.lc-fld:last-child{border-right:none}
.lc-fld-lbl{font-size:10px;color:#aaa;margin-bottom:2px;font-weight:600}
.lc-fld-val{font-size:13px;font-weight:700;cursor:pointer}
.lc-fld-val:hover{text-decoration:underline}
.calls-btn{display:flex;align-items:center;gap:5px;border:1px solid var(--bd);padding:5px 11px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:600;background:#fff}
.calls-btn:hover{background:#f5f5f5}
.calls-ico{width:24px;height:24px;border-radius:50%;background:#22c55e;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff}

/* ACTION BAR */
.abar{background:#fafafa;border-bottom:1px solid var(--bd);padding:8px 20px;display:flex;gap:8px;align-items:flex-start;flex-shrink:0}
.abar-note{flex:1;padding:7px 10px;border:1px solid var(--bd);border-radius:6px;font-size:13px;font-family:inherit;direction:rtl;resize:none;background:#fff;min-height:36px}
.abar-note:focus{outline:none;border-color:var(--L)}
.abar-btns{display:flex;flex-direction:column;gap:4px}
.abar-btns-row{display:flex;gap:4px}

/* BODY */
.lc-body{display:grid;grid-template-columns:1fr 400px;overflow:hidden}
.feed{padding:14px 18px;overflow-y:auto}
.props{overflow-y:auto;background:#fff;border-right:1px solid var(--bd)}

/* FEED */
.fi{display:flex;gap:10px;margin-bottom:12px}
.fi-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;margin-top:2px}
.fi-bub{background:#fff;border:1px solid var(--bd);border-radius:7px;padding:9px 12px;flex:1}
.fi-who{font-size:12px;font-weight:700;color:var(--L);margin-bottom:2px}
.fi-tag{display:inline-block;padding:1px 7px;border-radius:3px;font-size:10px;font-weight:700;margin-bottom:4px;background:var(--L50);color:var(--L)}
.fi-txt{font-size:13px;line-height:1.5;white-space:pre-wrap}
.fi-time{font-size:11px;color:#aaa;margin-top:3px}

/* PROPS SECTIONS */
.sec{border-bottom:1px solid var(--bd)}
.sec-hdr{padding:10px 14px;font-size:12px;font-weight:700;color:#555;cursor:pointer;display:flex;align-items:center;gap:6px;background:#fafafa;user-select:none}
.sec-hdr:hover{background:#f0f0f0}
.sec-chev{font-size:11px;color:#aaa;transition:transform .15s}
.sec-chev.closed{transform:rotate(-90deg)}

/* PROP ROWS — each row is a button-like element */
.pr{display:flex;align-items:flex-start;padding:7px 14px;border-bottom:1px solid #f5f5f5;cursor:pointer;transition:background .1s;position:relative}
.pr:last-child{border-bottom:none}
.pr:hover{background:#f5f8ff}
.pr-lbl{font-size:11px;color:#999;width:145px;flex-shrink:0;padding-top:2px;line-height:1.3;font-weight:500}
.pr-val{flex:1;font-size:13px;font-weight:600;color:#1a1a1a;word-break:break-word}
.pr-val.empty{color:#bbb;font-weight:400;font-style:italic}
.pr-ico{font-size:12px;color:#ccc;flex-shrink:0;margin-top:2px;opacity:0;transition:opacity .1s}
.pr:hover .pr-ico{opacity:1;color:var(--L)}

/* EDIT MODAL (small popup) */
.edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:none;align-items:flex-start;justify-content:center;padding-top:80px}
.edit-overlay.show{display:flex}
.edit-box{background:#fff;border-radius:9px;box-shadow:0 8px 32px rgba(0,0,0,.18);width:360px;overflow:hidden}
.edit-hdr{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:#fff}
.edit-hdr-title{font-size:14px;font-weight:700}
.edit-body{padding:14px 16px}
.edit-inp{width:100%;padding:8px 10px;border:1.5px solid var(--bd);border-radius:6px;font-size:14px;font-family:inherit;direction:rtl;transition:border .12s}
.edit-inp:focus{outline:none;border-color:var(--L);box-shadow:0 0 0 3px rgba(27,79,222,.1)}
.edit-ta{width:100%;padding:8px 10px;border:1.5px solid var(--bd);border-radius:6px;font-size:13px;font-family:inherit;direction:rtl;resize:vertical;min-height:70px}
.edit-ta:focus{outline:none;border-color:var(--L)}
.edit-foot{padding:10px 16px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-start}
.edit-save{background:var(--L);color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:700}
.edit-save:hover{opacity:.85}
.edit-cancel{background:#fff;border:1.5px solid var(--bd);color:#666;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit}
.edit-close{background:none;border:none;cursor:pointer;font-size:20px;color:#aaa;padding:2px 6px;border-radius:4px}
.edit-close:hover{background:#f0f0f0}

/* PICK GRID */
.pick-grid{display:grid;gap:6px;margin-top:4px}
.pick-item{padding:9px 10px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;text-align:center;border:1.5px solid var(--bd);background:#f8f8f8;transition:all .12s}
.pick-item:hover{border-color:var(--L);color:var(--L);background:var(--L50)}
.pick-item.picked{background:var(--L);color:#fff;border-color:var(--L)}

/* DATE PICKER */
.dp-wrap{padding:2px}
.dp-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dp-nav{background:none;border:1px solid var(--bd);border-radius:5px;font-size:14px;cursor:pointer;padding:3px 8px;color:#555}
.dp-nav:hover{background:#f0f0f0}
.dp-title{font-size:13px;font-weight:700}
.dp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:10px}
.dp-dh{font-size:10px;color:#aaa;text-align:center;padding:2px 0;font-weight:700}
.dp-d{font-size:12px;text-align:center;padding:5px 2px;cursor:pointer;border-radius:5px;border:1.5px solid transparent}
.dp-d:hover{background:var(--L50);color:var(--L)}
.dp-d.today{background:#f0f0f0;font-weight:700}
.dp-d.picked{background:var(--L);color:#fff;font-weight:700}
.dp-d.other{color:#ccc;cursor:default}
.dp-time-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.dp-time-inp{flex:1;padding:6px 8px;border:1.5px solid var(--bd);border-radius:5px;font-size:13px;font-family:inherit;text-align:center}
.dp-time-inp:focus{outline:none;border-color:var(--L)}

/* OVERLAY MODAL (for calls / meetings etc) */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;display:none;align-items:flex-start;justify-content:center;padding-top:50px}
.ovl.show{display:flex}
.modal{background:#fff;border-radius:9px;box-shadow:0 10px 36px rgba(0,0,0,.18);overflow:hidden;max-height:calc(100vh - 100px);overflow-y:auto}
.mhdr{padding:12px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:5}
.mhdr-t{font-size:14px;font-weight:700}
.mclosex{background:none;border:none;cursor:pointer;font-size:20px;color:#aaa;padding:2px 6px;border-radius:4px}
.mclosex:hover{background:#f0f0f0}
.flbl{font-size:11px;color:#666;margin-bottom:4px;display:block;font-weight:700}
.finp,.fsel,.fta{width:100%;padding:8px 10px;border:1.5px solid var(--bd);border-radius:6px;background:#fff;font-family:inherit;font-size:13px;direction:rtl;transition:border .12s}
.finp:focus,.fsel:focus,.fta:focus{outline:none;border-color:var(--L)}
.fta{resize:vertical;min-height:60px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.mb10{margin-bottom:10px}.mb14{margin-bottom:14px}
.mbtn{background:var(--L);color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:700}
.mbtn:hover{opacity:.85}
.mbtn2{background:#fff;border:1.5px solid var(--bd);color:#666;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit}
.fsec{font-size:10px;font-weight:700;color:#888;margin:14px 0 8px;padding-bottom:4px;border-bottom:2px solid var(--bd);text-transform:uppercase;letter-spacing:.5px}
.chkrow{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.chkrow input{width:16px;height:16px;cursor:pointer;accent-color:var(--L);flex-shrink:0}

/* CALLS TABLE */
.ctbl{width:100%;border-collapse:collapse;font-size:12px}
.ctbl th{padding:8px 12px;text-align:right;font-weight:600;color:#777;border-bottom:2px solid var(--bd);background:#fafafa;white-space:nowrap}
.ctbl td{padding:8px 12px;border-bottom:1px solid #f0f0f0}
.ctbl tr:hover td{background:#f9faff}
.cdir{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700}
.cin{background:#dcfce7;color:#16a34a}.cout{background:#dbeafe;color:#1d4ed8}
.cmiss{background:#fee2e2;color:#dc2626}.ccan{background:#f3f4f6;color:#6b7280}

/* BOARD */
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:14px}
.kcard{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:13px 14px}
.klbl{font-size:11px;color:#888;margin-bottom:4px;font-weight:700}
.kval{font-size:24px;font-weight:800}
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 14px 14px}
.bcard{background:#fff;border:1px solid var(--bd);border-radius:9px;padding:14px}
.btitle{font-size:10px;font-weight:700;color:#aaa;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}

/* AUTO */
.autorow{background:#fff;border:1px solid var(--bd);border-radius:7px;padding:12px 14px;margin-bottom:9px;display:flex;align-items:center;gap:10px}
.tog{width:34px;height:19px;border-radius:10px;position:relative;cursor:pointer;flex-shrink:0;transition:background .18s}
.togk{width:13px;height:13px;background:#fff;border-radius:50%;position:absolute;top:3px;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:left .15s}

/* TASK ROW */
.tr{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid #f0f0f0;background:#fff}
.tr:hover{background:#f9faff}
.trchk{width:17px;height:17px;margin-left:11px;cursor:pointer;accent-color:var(--L);flex-shrink:0}

/* EMPTY */
.empty{padding:60px;text-align:center;color:#aaa}
.empty-ico{font-size:36px;margin-bottom:10px}

/* TOAST */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:9px 18px;border-radius:7px;font-size:13px;z-index:9999;opacity:0;transition:opacity .22s;pointer-events:none;box-shadow:0 4px 14px rgba(0,0,0,.25)}
.toast.show{opacity:1}

/* VIEW SWITCH (list / kanban) */
.vsw{padding:5px 12px;font-size:12px;font-family:inherit;font-weight:600;border:none;background:#fff;color:#888;cursor:pointer}
.vsw:hover{background:#f5f5f5}
.vsw.on{background:var(--L);color:#fff}

/* KANBAN */
.kanban{display:flex;gap:10px;padding:14px;overflow-x:auto;height:100%;align-items:flex-start}
.kcol{background:#f0f1f4;border-radius:9px;width:248px;flex-shrink:0;display:flex;flex-direction:column;max-height:100%}
.kcol-hdr{padding:10px 12px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:7px;border-bottom:2px solid transparent}
.kcol-cnt{margin-right:auto;background:#fff;border-radius:10px;padding:1px 8px;font-size:11px;color:#888}
.kcol-body{padding:8px;overflow-y:auto;flex:1;min-height:60px}
.kcol-body.drag-over{background:#e3e8ff;border-radius:7px}
.kcard2{background:#fff;border:1px solid var(--bd);border-radius:7px;padding:9px 11px;margin-bottom:8px;cursor:grab;transition:box-shadow .12s,transform .12s}
.kcard2:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.kcard2.dragging{opacity:.45;transform:scale(.97)}
.kcard2-name{font-size:13px;font-weight:700;margin-bottom:3px}
.kcard2-meta{font-size:11px;color:#888;display:flex;align-items:center;gap:6px;flex-wrap:wrap}

/* REPORTS */
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 14px 14px}
.funnel-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.funnel-bar{flex:1;height:26px;border-radius:5px;display:flex;align-items:center;padding:0 9px;color:#fff;font-size:12px;font-weight:700;min-width:28px;transition:width .4s}
.rbar-track{flex:1;background:#f0f0f0;border-radius:3px;height:7px;overflow:hidden}
.rbar-fill{height:100%;border-radius:3px}

/* MONTH CALENDAR */
.mcal{padding:14px;max-width:760px;margin:0 auto;position:relative}
.mc-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.mc-title{font-size:16px;font-weight:800;color:var(--L);min-width:92px;text-align:center}
.mc-navb{background:#fff;border:1px solid var(--bd);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:17px;color:#555;font-family:inherit}
.mc-navb:hover{background:#f0f0f0}
.mc-card{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:12px}
.mc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.mc-dh{text-align:center;font-size:12px;font-weight:700;color:#999;padding:6px 0}
.mc-cell{position:relative;min-height:46px;display:flex;align-items:center;justify-content:center;font-size:15px;border-radius:10px;cursor:pointer;color:#2d3748}
.mc-cell:hover{background:#f3f4ff}
.mc-other{color:#cbd0d8;cursor:default}
.mc-other:hover{background:none}
.mc-today{color:var(--L);font-weight:800}
.mc-sel{background:var(--L);color:#fff;font-weight:800}
.mc-sel:hover{background:var(--L)}
.mc-dot{position:absolute;bottom:6px;width:6px;height:6px;border-radius:50%}
.mc-sel .mc-dot{background:#fff !important}
.mc-list{margin-top:14px}
.mc-list-h{font-size:13px;font-weight:700;color:#555;margin-bottom:6px;padding:0 2px}
.mc-ev{display:flex;align-items:center;gap:11px;padding:12px 4px;border-bottom:1px solid #f0f0f0;cursor:pointer}
.mc-ev:hover{background:#fafafa}
.mc-ev-time{font-size:13px;color:#666;direction:ltr;min-width:96px;text-align:left;font-weight:600}
.mc-ev-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.mc-ev-title{font-size:14px;font-weight:600}
.mc-empty{color:#aaa;font-size:13px;padding:16px 4px;text-align:center}
.mc-fab{position:fixed;bottom:22px;left:22px;width:54px;height:54px;border-radius:50%;background:#16a34a;color:#fff;border:none;font-size:28px;line-height:1;cursor:pointer;box-shadow:0 5px 16px rgba(0,0,0,.25);z-index:120;display:flex;align-items:center;justify-content:center}
.mc-fab:hover{background:#15803d}

/* MOBILE: hidden on desktop */
.nav-burger{display:none}
.sb-backdrop{display:none}
.only-mobile{display:none}
.lcard{background:#fff;border:1px solid var(--bd);border-radius:9px;padding:11px 12px;margin-bottom:8px;cursor:pointer}
.lcard:active{background:#f9faff}
.lcard-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}
.lcard-name{font-size:14px;font-weight:700}
.lcard-meta{font-size:12px;color:#666;margin-top:2px}
.lcard-phone{font-weight:600}
.leads-cards{padding:10px}

/* ════ RESPONSIVE — phone & tablet ════ */
@media (max-width:768px){
  body{font-size:14px}
  html,body{height:auto}
  /* fill the screen top-to-bottom */
  .app{display:block;min-height:calc(100vh - 44px);min-height:calc(100dvh - 44px)}
  .main{overflow:visible}
  .content{overflow:visible !important;height:auto}
  /* leads: cards on phone, table only on desktop */
  .only-desktop{display:none}
  .only-mobile{display:block}

  /* NAV: horizontally scrollable tabs (sidebar is docked, no hamburger) */
  .nav{padding:0 8px}
  .nav-burger{display:none}
  .nav-logo{margin-left:8px;font-size:13px;flex-shrink:0}
  #NAV-LINKS{flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch}
  #NAV-LINKS::-webkit-scrollbar{height:0}
  .nav-link{padding:0 9px;font-size:12px;flex-shrink:0;white-space:nowrap}

  /* SIDEBAR: docked permanently on the leads/tasks list — always visible */
  .sb{display:none}
  .sb-backdrop{display:none !important}
  .app.dock{display:flex}

  const svBtn=eb.querySelector('.edit-save');

/* ── EDIT A FIELD ── */
function editField(leadId, field, label, type){
  const lead=LEADS.find(x=>x.id===leadId);if(!lead)return;
  const curVal=String(lead[field]||'');
  const c=col(lead.br);

  if(type==='pick'){
    const opts=field==='st'?ST:field==='ev'?EV:field==='resp'?RESP:field==='mo'?MO:field==='mg'?MGRS:field==='sl'?SL:SK;
    const cols=field==='ev'||field==='mo'?2:1;
    const items=opts.map(o=>`<div class="pick-item${lead[field]===o.v?' picked':''}" data-v="${o.v}">${o.l}</div>`).join('');
    openEP(`
      <div class="edit-hdr"><span class="edit-hdr-title">${label}</span><button class="edit-close">×</button></div>
      <div class="edit-body">
        <div class="pick-grid" style="grid-template-columns:repeat(${cols},1fr)">${items}</div>
      </div>`,
      ()=>{}
    );
    // pick items click directly
    document.querySelectorAll('#EB .pick-item').forEach(el=>{
      el.addEventListener('click',()=>{
        lead[field]=el.dataset.v;
        closeEP();
        refreshPropRow(leadId,field,opts);
        syncHeader(leadId,field,opts);
        if(field==='mg'){
          const mh=document.getElementById('MGR-HDR-'+leadId);
          if(mh)mh.textContent=lead.mg+' ▾';
          renderLeadCard();
        }
        renderSB();
        toast('עודכן ✓');
      });
    });
    return;
  }

  if(type==='dt'){
    if(curVal){const p=curVal.split('/');if(p.length>=3){DP.y=parseInt(p[2]);DP.m=parseInt(p[1])-1;}}
    DP.sel=null;
    openEP(`
      <div class="edit-hdr"><span class="edit-hdr-title">${label}</span><button class="edit-close">×</button></div>
      <div class="edit-body">
        <div class="dp-wrap" id="DP-WRAP"></div>
      </div>
      <div class="edit-foot">
        <button class="edit-save">✓ שמור</button>
        <button class="edit-cancel">ביטול</button>
      </div>`,
      ()=>{
        if(!DP.sel){toast('⚠ בחר תאריך');return;}
        const t=(document.getElementById('DP-TIME')||{}).value||'';
        lead[field]=DP.sel+(t?' '+t:'');
        refreshPropRow(leadId,field,null);
        toast('תאריך עודכן ✓');
      }
    );
    renderDP();
    // override save to not close if no date
    const svBtn=document.querySelector('#EB .edit-save');
    if(svBtn) svBtn.onclick=()=>{
      if(!DP.sel){toast('⚠ בחר תאריך');return;}
      const t=(document.getElementById('DP-TIME')||{}).value||'';
      lead[field]=DP.sel+(t?' '+t:'');
      refreshPropRow(leadId,field,null);
      closeEP();
      toast('תאריך עודכן ✓');
    };
    return;
  }

  // text / number / textarea
  const isTA=type==='textarea';
  const isNum=type==='number';
  const inpTag=isTA?`<textarea class="edit-ta" id="EI" rows="3">${curVal}</textarea>`
    :`<input class="edit-inp" id="EI" type="${isNum?'number':'text'}" value="${curVal}" ${isNum?'min="0"':''} ${field==='p'?'style="direction:ltr;text-align:right"':''}>`;
  openEP(`
    <div class="edit-hdr"><span class="edit-hdr-title">${label}</span><button class="edit-close">×</button></div>
    <div class="edit-body">${inpTag}</div>
    <div class="edit-foot">
      <button class="edit-save" style="background:${c}">✓ שמור</button>
      <button class="edit-cancel">ביטול</button>
    </div>`,
    ()=>{
      const ei=document.getElementById('EI');
      const nv=ei?ei.value.trim():'';
      lead[field]=isNum?(parseInt(nv)||0):nv;
      refreshPropRow(leadId,field,null);
      if(field==='n'){const nm=document.querySelector('.lc-name');if(nm)nm.textContent=nv;}
      if(field==='p'){const ph=document.getElementById('LC-PHONE');if(ph)ph.textContent=nv;}
      renderSB();toast('עודכן ✓');
    }
  );
}

/* ── REFRESH A SINGLE PROP ROW ── */
function refreshPropRow(leadId,field,opts){
  const lead=LEADS.find(x=>x.id===leadId);if(!lead)return;
  const el=document.getElementById('PRV-'+leadId+'-'+field);if(!el)return;
  let display='';
  if(opts) display=L(opts,lead[field]);
  else display=String(lead[field]||'');
  el.textContent=display||'';
  el.className='pr-val'+(display?'':' empty');
  if(!display) el.textContent='לחץ לעריכה...';
}
function syncHeader(leadId,field,opts){
  const lead=LEADS.find(x=>x.id===leadId);if(!lead)return;
  const txt=L(opts,lead[field]);
  const hdr=document.getElementById('LC-HDR-'+field);
  if(hdr)hdr.textContent=txt||'—';
}

/* ── DATE PICKER ── */
function renderDP(){
  const wrap=document.getElementById('DP-WRAP');if(!wrap)return;
  const y=DP.y,m=DP.m;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const tod=new Date();const todS=p(tod.getDate())+'/'+p(tod.getMonth()+1)+'/'+tod.getFullYear();
  let cells='';
  ['א','ב','ג','ד','ה','ו','ש'].forEach(d=>cells+=`<div class="dp-dh">${d}</div>`);
  for(let i=0;i<first;i++)cells+=`<div class="dp-d other"></div>`;
  for(let d=1;d<=days;d++){
    const ds=p(d)+'/'+p(m+1)+'/'+y;
    cells+=`<div class="dp-d${DP.sel===ds?' picked':ds===todS?' today':''}" data-d="${ds}">${d}</div>`;
  }
  wrap.innerHTML=`<div class="dp-hdr">
    <button class="dp-nav" id="DP-PREV">‹</button>
    <span class="dp-title">${MN_HE[m]} ${y}</span>
    <button class="dp-nav" id="DP-NEXT">›</button>
  </div>
  <div class="dp-grid">${cells}</div>
  <div class="dp-time-row">
    <span style="font-size:11px;color:#888;font-weight:700">שעה</span>
    <input type="time" id="DP-TIME" class="dp-time-inp" value="10:00">
  </div>`;
  document.getElementById('DP-PREV').onclick=()=>{DP.m--;if(DP.m<0){DP.m=11;DP.y--;}renderDP();};
  document.getElementById('DP-NEXT').onclick=()=>{DP.m++;if(DP.m>11){DP.m=0;DP.y++;}renderDP();};
  wrap.querySelectorAll('.dp-d:not(.other)').forEach(el=>{
    el.addEventListener('click',()=>{DP.sel=el.dataset.d;renderDP();});
  });
}

let DRAG_ID=null;
function wireKanban(){
  document.querySelectorAll('.kcard2').forEach(card=>{
    card.addEventListener('dragstart',e=>{DRAG_ID=parseInt(card.dataset.id);card.classList.add('dragging');e.stopPropagation();});
    card.addEventListener('dragend',()=>{DRAG_ID=null;document.querySelectorAll('.kcard2').forEach(c=>c.classList.remove('dragging'));document.querySelectorAll('.kcol-body').forEach(b=>b.classList.remove('drag-over'));});
  });
  document.querySelectorAll('.kcol-body').forEach(body=>{
    body.addEventListener('dragover',e=>{e.preventDefault();body.classList.add('drag-over');});
    body.addEventListener('dragleave',()=>body.classList.remove('drag-over'));
    body.addEventListener('drop',e=>{
      e.preventDefault();body.classList.remove('drag-over');
      if(DRAG_ID==null)return;
      const lead=LEADS.find(x=>x.id===DRAG_ID);if(!lead)return;
      const sv=body.dataset.sv;
      if(sv&&lead.st!==sv){lead.st=sv;toast('הליד הועבר ל"'+L(ST,sv)+'" ✓');}
      renderContent();renderSB();
    });
  });
}

/* ════════════════════════════════════
   דוחות ואנליטיקה
════════════════════════════════════ */
function renderReports(){
  const total=LEADS.length;
  const closed=EVENTS_DB.length;
  const conv=total?Math.round(closed/total*100):0;
  const revenue=EVENTS_DB.reduce((s,e)=>s+(e.total||0),0);

  // ── מקורות: לידים, נסגרו, המרה ──
  const srcMap={};
  LEADS.forEach(l=>{
    const sv=l.br==='kamil'?l.sk:l.sl;
    const label=l.br==='kamil'?L(SK,sv):L(SL,sv);
    if(!label)return;
    const key=(l.br==='kamil'?'קמיליון':'לואי')+' · '+label;
    if(!srcMap[key])srcMap[key]={br:l.br,leads:0,closed:0};
    srcMap[key].leads++;
    if(l.st==='11')srcMap[key].closed++;
  });
  const srcRows=Object.entries(srcMap).sort((a,b)=>b[1].leads-a[1].leads);
  const maxLeads=Math.max(...srcRows.map(r=>r[1].leads),1);

  // ── משפך המרה ──
  const funnel=[
    {l:'לידים חדשים',n:LEADS.filter(l=>l.st==='6').length,c:'#f59e0b'},
    {l:'בתהליך פגישה',n:LEADS.filter(l=>l.st==='9').length,c:'#7C3AED'},
    {l:'נקבעה פגישה',n:LEADS.filter(l=>l.st==='5').length,c:'#1d4ed8'},
    {l:'היו בפגישה',n:LEADS.filter(l=>l.st==='2').length,c:'#0891b2'},
    {l:'אירועים סגורים',n:closed,c:'#16a34a'},
  ];
  const maxFun=Math.max(...funnel.map(f=>f.n),1);

  // ── ביצועי נציגים ──
  const agentMap={};
  LEADS.forEach(l=>{
    const a=l.mg||'—';
    if(!agentMap[a])agentMap[a]={leads:0,closed:0};
    agentMap[a].leads++;
    if(l.st==='11')agentMap[a].closed++;
  });
  const agentRows=Object.entries(agentMap).sort((a,b)=>b[1].leads-a[1].leads);

  // ── אירועים לפי חודש ──
  const monthMap={};
  EVENTS_DB.forEach(e=>{if(!e.date)return;const mi=parseInt(e.date.slice(5,7))-1;monthMap[mi]=(monthMap[mi]||0)+1;});
  const maxMonth=Math.max(...Object.values(monthMap),1);

  return`<div class="kgrid" style="grid-template-columns:repeat(4,1fr)">
    <div class="kcard"><div class="klbl">סה"כ לידים</div><div class="kval" style="color:var(--L)">${total}</div></div>
    <div class="kcard"><div class="klbl">נסגרו לאירוע</div><div class="kval" style="color:#16a34a">${closed}</div></div>
    <div class="kcard"><div class="klbl">אחוז המרה</div><div class="kval" style="color:var(--K)">${conv}%</div></div>
    <div class="kcard"><div class="klbl">סה"כ הכנסות</div><div class="kval" style="font-size:19px">${money(revenue)}</div></div>
  </div>

  <div class="rgrid">
    <!-- משפך המרה -->
    <div class="bcard">
      <div class="btitle">📊 משפך המרה</div>
      ${funnel.map(f=>`<div class="funnel-row">
        <div style="min-width:110px;font-size:12px">${f.l}</div>
        <div class="funnel-bar" style="background:${f.c};width:${Math.max(f.n/maxFun*100,8)}%">${f.n}</div>
      </div>`).join('')}
    </div>

    <!-- אירועים לפי חודש -->
    <div class="bcard">
      <div class="btitle">📅 אירועים סגורים לפי חודש</div>
      ${Object.keys(monthMap).length?MN_HE.map((mn,i)=>{
        if(!monthMap[i])return'';
        return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div style="min-width:70px;font-size:12px">${mn}</div>
          <div class="rbar-track"><div class="rbar-fill" style="width:${monthMap[i]/maxMonth*100}%;background:var(--K)"></div></div>
          <div style="font-size:12px;color:#888;min-width:18px;text-align:left">${monthMap[i]}</div>
        </div>`;
      }).join(''):'<div style="color:#aaa;font-size:13px;padding:8px 0">אין אירועים סגורים עדיין</div>'}
    </div>

    <!-- ROI לפי מקור -->
    <div class="bcard" style="grid-column:1 / -1">
      <div class="btitle">🎯 ROI לפי מקור הגעה</div>
      <table class="tbl"><thead><tr>
        <th>מקור</th><th style="width:38%">לידים</th><th>נסגרו</th><th>אחוז המרה</th>
      </tr></thead><tbody>
      ${srcRows.length?srcRows.map(([k,v])=>{
        const cv=v.leads?Math.round(v.closed/v.leads*100):0;
        const c=v.br==='kamil'?'var(--K)':'var(--L)';
        return`<tr>
          <td style="font-weight:600">${k}</td>
          <td><div style="display:flex;align-items:center;gap:8px"><div class="rbar-track"><div class="rbar-fill" style="width:${v.leads/maxLeads*100}%;background:${c}"></div></div><span style="font-size:12px;min-width:18px">${v.leads}</span></div></td>
          <td style="font-weight:700;color:#16a34a">${v.closed}</td>
          <td><span class="badge ${cv>=30?'BD':cv>0?'BM':'BN'}">${cv}%</span></td>
        </tr>`;
      }).join(''):'<tr><td colspan="4" style="color:#aaa;text-align:center;padding:20px">אין נתוני מקור עדיין</td></tr>'}
      </tbody></table>
    </div>

    <!-- ביצועי נציגים -->
    <div class="bcard" style="grid-column:1 / -1">
      <div class="btitle">👥 ביצועי נציגים</div>
      <table class="tbl"><thead><tr>
        <th>נציג</th><th>לידים</th><th>נסגרו</th><th>אחוז סגירה</th>
      </tr></thead><tbody>
      ${agentRows.map(([a,v])=>{
        const cv=v.leads?Math.round(v.closed/v.leads*100):0;
        return`<tr>
          <td style="font-weight:600">${a}</td>
          <td>${v.leads}</td>
          <td style="font-weight:700;color:#16a34a">${v.closed}</td>
          <td><span class="badge ${cv>=30?'BD':cv>0?'BM':'BN'}">${cv}%</span></td>
        </tr>`;
      }).join('')}
      </tbody></table>
    </div>
  </div>`;
}

function buildReportRows(lead){
  const r=lead.report||{};
  const fields=[
    ['שעת האירוע','time','text'],['שם החוגג/ת באנגלית','celeb','text'],
    ['כמות ילדים','kids','number'],['תפריט ילדים','menu','text'],
    ['מנות ללא לקטוז','lac','number'],['מנות ללא גלוטן','glu','number'],
    ['האם יש ספק חיצוני?','ext','text'],['האם יש ילדים עם נחות?','spec','text'],
    ['הערות של הלקוחה','notes','textarea'],
    ['תאריך הגעה עם ציוד','bringdt','dt'],
    ['זוית אירוע סגור/פתוח','angle','text'],
  ];
  return fields.map(([label,key,type])=>{
    const v=String(r[key]||'');
    return`<div class="pr" onclick="editReportField(${lead.id},'${key}','${label}','${type}')">
      <div class="pr-lbl">${label}</div>
      <div class="pr-val${v?'':' empty'}" id="PRV-${lead.id}-rp-${key}">${v||'לחץ לעריכה...'}</div>
      <div class="pr-ico">${type==='dt'?'📅':type==='pick'?'▾':'✏'}</div>
    </div>`;
  }).join('')+
  ['האם הביאו תמונות ללופ','האם הביאו מצגת לאירוע','האם שלחו שובר אקום','האם נמצא צאק בטחון תקין'].map((label,i)=>{
    const key='chk'+i;const v=r[key]||false;
    return`<div class="pr"><div class="pr-lbl">${label}</div>
      <div class="pr-val" style="cursor:default"><input type="checkbox" ${v?'checked':''} style="accent-color:var(--L);width:16px;height:16px" onchange="lead_updateReportChk(${lead.id},'${key}',this.checked)"></div>
    </div>`;
  }).join('');
}

function editReportField(leadId,key,label,type){
  const lead=LEADS.find(x=>x.id===leadId);if(!lead)return;
  if(!lead.report)lead.report={};
  const curV=String(lead.report[key]||'');
  const c=col(lead.br);

  if(type==='dt'){
    if(curV){const ps=curV.split('/');if(ps.length>=3){DP.y=parseInt(ps[2]);DP.m=parseInt(ps[1])-1;}}
    DP.sel=null;
    openEP(`<div class="edit-hdr"><span class="edit-hdr-title">${label}</span><button class="edit-close">×</button></div>
      <div class="edit-body"><div class="dp-wrap" id="DP-WRAP"></div></div>
      <div class="edit-foot"><button class="edit-save">✓ שמור</button><button class="edit-cancel">ביטול</button></div>`,()=>{});
    renderDP();
    document.querySelector('#EB .edit-save').onclick=()=>{
      if(!DP.sel){toast('⚠ בחר תאריך');return;}
      const t=(document.getElementById('DP-TIME')||{}).value||'';
      lead.report[key]=DP.sel+(t?' '+t:'');
      const el=document.getElementById('PRV-'+leadId+'-rp-'+key);
      if(el){el.textContent=lead.report[key];el.className='pr-val';}
      closeEP();toast('עודכן ✓');
    };
    return;
  }
  const isTA=type==='textarea';const isNum=type==='number';
  const inpTag=isTA?`<textarea class="edit-ta" id="EI" rows="3">${curV}</textarea>`
    :`<input class="edit-inp" id="EI" type="${isNum?'number':'text'}" value="${curV}" ${isNum?'min="0"':''}>`;
  openEP(`<div class="edit-hdr"><span class="edit-hdr-title">${label}</span><button class="edit-close">×</button></div>
    <div class="edit-body">${inpTag}</div>
    <div class="edit-foot"><button class="edit-save" style="background:${c}">✓ שמור</button><button class="edit-cancel">ביטול</button></div>`,
    ()=>{
      const ei=document.getElementById('EI');const nv=ei?ei.value.trim():'';
      lead.report[key]=isNum?(parseInt(nv)||0):nv;
      const el=document.getElementById('PRV-'+leadId+'-rp-'+key);
      if(el){el.textContent=nv||'לחץ לעריכה...';el.className='pr-val'+(nv?'':' empty');}
      toast('עודכן ✓');
    }
  );
}

function lead_updateReportChk(id,key,val){
  const lead=LEADS.find(x=>x.id===id);if(!lead)return;
  if(!lead.report)lead.report={};
  lead.report[key]=val;
}

/* ── CALENDAR (Fireberry-style weekly) ── */
let CAL_FILTER='all';
let CAL_Y=null,CAL_M=null,CAL_SEL=null;
function _iso(d){return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());}
function calInit(){if(CAL_Y===null){const t=new Date();CAL_Y=t.getFullYear();CAL_M=t.getMonth();CAL_SEL=_iso(t);}}
function calMove(d){calInit();CAL_M+=d;if(CAL_M<0){CAL_M=11;CAL_Y--;}if(CAL_M>11){CAL_M=0;CAL_Y++;}renderContent();}
function calToday(){const t=new Date();CAL_Y=t.getFullYear();CAL_M=t.getMonth();CAL_SEL=_iso(t);renderContent();}
function calPick(iso){CAL_SEL=iso;renderContent();}
function calMeetInfo(id){const mt=MEETS.find(x=>x.id===id);if(mt)toast('\u{1F4C5} '+mt.sub+(mt.own?' \u2022 '+mt.own:''));}
function renderCal(){
  calInit();
  const y=CAL_Y,m=CAL_M;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const prevDays=new Date(y,m,0).getDate();
  const todIso=_iso(new Date());
  let mlist=MEETS.slice();if(CAL_FILTER!=='all')mlist=mlist.filter(x=>x.br===CAL_FILTER);
  const byDay={};mlist.forEach(mt=>{if(!mt.start)return;const d=mt.start.slice(0,10);(byDay[d]=byDay[d]||[]).push(mt);});
  const dh=['\u05D0','\u05D1','\u05D2','\u05D3','\u05D4','\u05D5','\u05E9'];
  let cells=dh.map(d=>`<div class="mc-dh">${d}</div>`).join('');
  for(let i=0;i<first;i++){const dn=prevDays-first+1+i;cells+=`<div class="mc-cell mc-other"><span>${dn}</span></div>`;}
  for(let d=1;d<=days;d++){
    const iso=y+'-'+p(m+1)+'-'+p(d);
    const list=byDay[iso]||[];
    const isSel=iso===CAL_SEL,isTod=iso===todIso;
    const mixed=list.some(x=>x.br==='kamil')&&list.some(x=>x.br!=='kamil');
    const dotc=!list.length?'':mixed?'#888':(list[0].br==='kamil'?'var(--K)':'#ec4899');
    cells+=`<div class="mc-cell${isSel?' mc-sel':isTod?' mc-today':''}" onclick="calPick('${iso}')"><span>${d}</span>${list.length?`<span class="mc-dot" style="background:${dotc}"></span>`:''}</div>`;
  }
  const total=first+days;const trail=(7-(total%7))%7;
  for(let i=1;i<=trail;i++)cells+=`<div class="mc-cell mc-other"><span>${i}</span></div>`;
  const selList=(byDay[CAL_SEL]||[]).slice().sort((a,b)=>(a.start||'').localeCompare(b.start||''));
  const selDate=new Date(CAL_SEL+'T00:00:00');
  const selLabel=selDate.toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'});
  return`<div class="mcal">
    <div class="mc-top">
      <div style="display:flex;align-items:center;gap:6px">
        <button class="mc-navb" onclick="calMove(-1)">\u203A</button>
        <div class="mc-title">${MN_HE[m]} ${y}</div>
        <button class="mc-navb" onclick="calMove(1)">\u2039</button>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-right:auto">
        <button class="abt" onclick="calToday()" style="font-weight:700">\u05D4\u05D9\u05D5\u05DD</button>
        <select class="fsel" style="width:auto;padding:5px 9px;font-size:12px" onchange="CAL_FILTER=this.value;renderContent()">
          <option value="all"${CAL_FILTER==='all'?' selected':''}>\u05DB\u05DC \u05D4\u05D9\u05D5\u05DE\u05E0\u05D9\u05DD</option>
          <option value="louie"${CAL_FILTER==='louie'?' selected':''}>\u05DC\u05D5\u05D0\u05D9</option>
          <option value="kamil"${CAL_FILTER==='kamil'?' selected':''}>\u05E7\u05DE\u05D9\u05DC\u05D9\u05D5\u05DF</option>
        </select>
      </div>
    </div>
    <div class="mc-card"><div class="mc-grid">${cells}</div></div>
    <div class="mc-list">
      <div class="mc-list-h">${selLabel}</div>
      ${selList.length?selList.map(mt=>{
        const t1=mt.start?mt.start.slice(11,16):'';const t2=mt.end?mt.end.slice(11,16):'';
        const dot=mt.br==='kamil'?'var(--K)':'#ec4899';
        return`<div class="mc-ev" onclick="calMeetInfo(${mt.id})">
          <span class="mc-ev-time">${t1?(t2?t1+'-'+t2:t1):'\u05DB\u05DC \u05D4\u05D9\u05D5\u05DD'}</span>
          <span class="mc-ev-dot" style="background:${dot}"></span>
          <span class="mc-ev-title">${mt.sub}${mt.own?' \u00B7 '+mt.own:''}</span>
        </div>`;
      }).join(''):'<div class="mc-empty">\u05D0\u05D9\u05DF \u05E4\u05D2\u05D9\u05E9\u05D5\u05EA \u05D1\u05D9\u05D5\u05DD \u05D6\u05D4</div>'}
    </div>
    <button class="mc-fab" onclick="openMeetModalCal('${CAL_SEL}T10:00')" title="\u05E4\u05D2\u05D9\u05E9\u05D4 \u05D7\u05D3\u05E9\u05D4">+</button>
  </div>`;
}

function seFillBody(reset){

function seInitSig(){
  const c=document.getElementById('SE-sig'); if(!c||c._sigInit) return; c._sigInit=true;
  const ctx=c.getContext('2d'); ctx.lineWidth=3; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#15324f';
  let drawing=false,lx=0,ly=0;
  function pos(e){ const r=c.getBoundingClientRect(); return {x:(e.clientX-r.left)*(c.width/r.width), y:(e.clientY-r.top)*(c.height/r.height)}; }
  c.addEventListener('pointerdown',e=>{ e.preventDefault(); drawing=true; c._hasInk=true; const p=pos(e); lx=p.x; ly=p.y; ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx+0.1,ly+0.1); ctx.stroke(); try{c.setPointerCapture(e.pointerId);}catch(_){}});
  c.addEventListener('pointermove',e=>{ if(!drawing)return; e.preventDefault(); const p=pos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p.x,p.y); ctx.stroke(); lx=p.x; ly=p.y; });
  const end=()=>{drawing=false;}; c.addEventListener('pointerup',end); c.addEventListener('pointercancel',end);
}
function seClearSig(){ const c=document.getElementById('SE-sig'); if(!c)return; c.getContext('2d').clearRect(0,0,c.width,c.height); c._hasInk=false; }
function seSigData(){ const c=document.getElementById('SE-sig'); if(!c||!c._hasInk)return''; try{return c.toDataURL('image/png');}catch(e){return'';} }
function seRestoreSig(url){ const c=document.getElementById('SE-sig'); if(!c||!url)return; const img=new Image(); img.onload=()=>{ c.getContext('2d').drawImage(img,0,0,c.width,c.height); c._hasInk=true; }; img.src=url; }
function seWaNum(raw){ let n=String(raw||'').replace(/\D/g,''); if(n.indexOf('972')===0){} else if(n.charAt(0)==='0'){ n='972'+n.slice(1); } else if(n.length===9&&n.charAt(0)==='5'){ n='972'+n; } return n; }
function seSendToClient(){
  const lead=SE_LEAD; const text=(document.getElementById('SE-body')||{}).value||'';
  if(!text.trim()){ toast('⚠ הנוסח ריק'); return; }
  const co=SE_COMPANY[seBrandKey((document.getElementById('SE-brand')||{}).value)]||SE_COMPANY.louie;
  const msg='שלום'+(lead&&lead.n?' '+lead.n:'')+', מצורף הסכם סגירת האירוע מול '+co.name+'.\nנא לעבור על הנוסח ולאשר בחתימה דיגיטלית לסגירת ההזמנה:\n\n'+text;
  const num=seWaNum(lead&&lead.p);
  try{ if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(msg); }catch(e){}
  const url='https://wa.me/'+(num||'')+'?text='+encodeURIComponent(msg);
  const a=document.createElement('a'); a.href=url; a.target='_blank'; a.rel='noopener'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
  if(lead){ if(!lead.esign) lead.esign={}; lead.esign.sent=true; lead.esign.sentAt=now(); lead.esign.text=text; lead.esign.brand=seBrandKey((document.getElementById('SE-brand')||{}).value);
    lead.feed=lead.feed||[]; lead.feed.unshift({who:'מערכת',txt:'נשלח ללקוח הסכם לחתימה דיגיטלית',t:now()}); }
  toast(num?'נפתח וואטסאפ — הסכם נשלח ללקוח':'אין מספר תקין — הנוסח הועתק');
}
function seMarkSigned(){
  const lead=SE_LEAD; const text=(document.getElementById('SE-body')||{}).value||'';
  if(!text.trim()){ toast('⚠ הנוסח ריק'); return; }
  const sig=seSigData();

  if(lead){
    lead.esign={signed:true, at:now(), brand:seBrandKey((document.getElementById('SE-brand')||{}).value), text, sig};
    lead.feed=lead.feed||[]; lead.feed.unshift({who:'מערכת',txt:'✓ הלקוח חתם דיגיטלית על סגירת האירוע',t:now()});

function submitCloseEvent(fromLead){
  const cust=document.getElementById('CE-cust').value.trim();

  if(!cust){toast('⚠ שם לקוח חובה');return;}
  if(!date){toast('⚠ תאריך אירוע חובה');return;}
  // anti-duplicate date check
  if(EVENTS_DB.some(e=>e.date===date)){
    if(!confirm('⚠ קיים כבר אירוע בתאריך '+date+'. להמשיך בכל זאת?'))return;
  }
  const sel=document.getElementById('CE-pkg');
  const opt=sel.options[sel.selectedIndex];
  const base=parseInt(opt.dataset.base)||0;
  const isMix=sel.value==='mix';
  const adults=parseInt(document.getElementById('CE-adults').value)||0;
  const kids=parseInt(document.getElementById('CE-kids').value)||0;
  const meal=parseInt(document.getElementById('CE-meal').value)||0;
  const total=base+(isMix?adults*meal:0);
  const deposit=parseInt(document.getElementById('CE-deposit').value)||0;
  const cstatus=document.getElementById('CE-cstatus').value;

  const evId=eid();
  const ctId=eid();
  // create contract
  CONTRACTS.push({id:ctId,eventId:evId,status:cstatus,total,deposit,signedAt:cstatus==='signed'?now():'',payment:document.getElementById('CE-payment').value});
  // create event card
  const startISO=date+'T'+(document.getElementById('CE-time').value||'19:00')+':00';

    kids,adults,meal,base,total,deposit,contractId:ctId,opStage:'op1',
    leadId:fromLead&&fromLead!=='null'?fromLead:null,
    tasks:[],files:[],comms:[],report:{},createdAt:now()
  };
  // auto-generate pipeline tasks based on EVENT TYPE template
  const evDate=new Date(date);
  const template=getTaskTemplate(ev.evType);
  template.forEach(tpl=>{
    const due=new Date(evDate);due.setDate(due.getDate()-tpl.before);
    ev.tasks.push({id:eid(),title:tpl.t,stage:tpl.stage,due:due.toISOString().slice(0,10),done:false,assignee:tpl.role});
  });
  EVENTS_DB.push(ev);

  MEETS.push({id:nid(),sub:'🎉 אירוע: '+cust,br:'kamil',start:startISO,end:date+'T23:30:00',own:'מנהל השירות',obj:cust});

  if(ev.leadId){const l=LEADS.find(x=>x.id===ev.leadId);if(l)l.st='11';}
  closeOvl();
  setNav('events');
  toast('🎉 אירוע נוצר! נפתחו '+ev.tasks.length+' משימות');
}

      <table class="tbl" style="background:#fff;border:1px solid var(--bd);border-radius:9px;overflow:hidden">
        <thead><tr><th>תפקיד</th><th>מסכים נגישים</th><th>עריכה</th><th>מחיקה</th><th>הגדרות</th></tr></thead>
        <tbody>${Object.entries(ROLES).map(([k,r])=>`<tr style="${ROLE===k?'background:var(--L50)':''}">

function addTemplateTask(evType){
  if(!TASK_TEMPLATES[evType])TASK_TEMPLATES[evType]=getTaskTemplate(evType).slice();
  openEP(`
    <div class="edit-hdr"><span class="edit-hdr-title">משימה חדשה לתבנית</span><button class="edit-close">×</button></div>
    <div class="edit-body">
      <label class="flbl">שם המשימה</label>
      <input class="edit-inp" id="TPL-T" placeholder="לדוגמה: אישור עיצוב" style="margin-bottom:10px">
      <label class="flbl">כמה ימים לפני האירוע?</label>
      <input class="edit-inp" id="TPL-B" type="number" value="14" style="margin-bottom:10px">
      <label class="flbl">אחראי</label>
      <select class="edit-inp" id="TPL-R"><option>מנהל השירות</option><option>מנהל</option><option>איש מכירות</option></select>
    </div>
    <div class="edit-foot">
      <button class="edit-save">✓ הוסף</button>
      <button class="edit-cancel">ביטול</button>
    </div>`,
    ()=>{
      const t=document.getElementById('TPL-T').value.trim();
      if(!t){toast('⚠ שם חובה');return;}
      const before=parseInt(document.getElementById('TPL-B').value)||0;
      const role=document.getElementById('TPL-R').value;
      TASK_TEMPLATES[evType].push({t,before,role,stage:'op4'});
      TASK_TEMPLATES[evType].sort((a,b)=>b.before-a.before);
      renderContent();toast('משימה נוספה לתבנית ✓');
    }
  );
}
function removeTemplateTask(evType,idx){
  if(!TASK_TEMPLATES[evType])return;
  TASK_TEMPLATES[evType].splice(idx,1);
  renderContent();toast('משימה הוסרה');
}

function togglePhone(idx){
  if(!PHONE_MAP[idx])return;
  PHONE_MAP[idx].active=!PHONE_MAP[idx].active;
  renderContent();
  toast(PHONE_MAP[idx].active?'המספר הופעל ✓':'המספר כובה');
}
function phoneTest(){
  const v=(document.getElementById('PH-TEST')||{}).value||'';
  const res=document.getElementById('PH-TEST-RES');if(!res)return;
  if(!v.trim()){res.style.color='#888';res.textContent='הקלד מספר כדי לראות לאיזה מותג ומקור הוא מנותב';return;}
  const d=detectSource(v);
  if(!d){res.style.color='#dc2626';res.innerHTML='⚠ מספר לא מזוהה — ינותב ל"בדיקת לידים" לאישור ידני';return;}
  const c=d.br==='kamil'?'var(--K)':'var(--L)';
  res.style.color=c;
  res.innerHTML=`✓ <b>${d.br==='kamil'?'קמיליון':'לואי'}</b> · ${d.label} <span style="color:#888;font-size:11px">(${d.api})</span>`;
}

/* ── BOARD ── */
function renderBoard(){
  const today=new Date();today.setHours(0,0,0,0);
  // metrics
  const nL=LEADS.filter(l=>l.st==='6').length;
  const closedEv=EVENTS_DB.length;
  // all event pipeline tasks
  let allEvTasks=[];
  EVENTS_DB.forEach(e=>e.tasks.forEach(t=>allEvTasks.push({...t,evCust:e.cust,evId:e.id})));
  const openEvTasks=allEvTasks.filter(t=>!t.done);
  const overdueEvTasks=openEvTasks.filter(t=>t.due&&new Date(t.due)<today);
  const totalRevenue=EVENTS_DB.reduce((s,e)=>s+(e.total||0),0);
  const collected=CONTRACTS.reduce((s,c)=>s+(c.deposit||0),0);
  // events by operational stage
  const stageCount={};OP_STAGES.forEach(s=>stageCount[s.k]=0);
  EVENTS_DB.forEach(e=>{stageCount[e.opStage]=(stageCount[e.opStage]||0)+1;});
  // upcoming events (next 30 days)
  const upcoming=EVENTS_DB.filter(e=>{const d=new Date(e.date);return d>=today;}).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,5);
  // unsigned contracts
  const unsigned=CONTRACTS.filter(c=>c.status!=='signed').length;

  // ── פגישות: היום / שבוע / חודש ──
  const wkStart=new Date(today);wkStart.setDate(today.getDate()-today.getDay());
  const wkEnd=new Date(wkStart);wkEnd.setDate(wkStart.getDate()+7);
  const moStart=new Date(today.getFullYear(),today.getMonth(),1);
  const moEnd=new Date(today.getFullYear(),today.getMonth()+1,1);
  const todStr=_iso(today);
  const mDate=m=>m.start?new Date(m.start.slice(0,10)+'T00:00:00'):null;
  const meetToday=MEETS.filter(m=>m.start&&m.start.slice(0,10)===todStr).length;
  const meetWeek=MEETS.filter(m=>{const d=mDate(m);return d&&d>=wkStart&&d<wkEnd;}).length;
  const meetMonth=MEETS.filter(m=>{const d=mDate(m);return d&&d>=moStart&&d<moEnd;}).length;
  const dealsMonth=EVENTS_DB.filter(e=>{if(!e.createdAt)return false;const pr=e.createdAt.split(' ')[0].split('/');return pr.length>=3&&(+pr[1])===today.getMonth()+1&&(+pr[2])===today.getFullYear();}).length;

  // ── שליטה לפי נציג מכירות: לידים לפי סטטוס ──
  const reps={};
  LEADS.forEach(l=>{const r=l.mg||'—';if(!reps[r])reps[r]={'6':0,'9':0,'5':0,'2':0,'11':0,tot:0};reps[r][l.st]=(reps[r][l.st]||0)+1;reps[r].tot++;});
  const repMeet={};MEETS.forEach(m=>{if(m.own)repMeet[m.own]=(repMeet[m.own]||0)+1;});
  const repRows=Object.entries(reps).sort((a,b)=>b[1].tot-a[1].tot);

  return`<div class="kgrid" style="grid-template-columns:repeat(4,1fr)">
    <div class="kcard"><div class="klbl">פגישות החודש</div><div class="kval" style="color:#ef4444">${meetMonth}</div></div>
    <div class="kcard"><div class="klbl">פגישות השבוע</div><div class="kval" style="color:#16a34a">${meetWeek}</div></div>
    <div class="kcard"><div class="klbl">פגישות היום</div><div class="kval" style="color:var(--L)">${meetToday}</div></div>
    <div class="kcard"><div class="klbl">עסקאות שנסגרו החודש</div><div class="kval" style="color:#f59e0b">${dealsMonth}</div></div>
  </div>

  <div class="kgrid" style="grid-template-columns:repeat(5,1fr)">
    <div class="kcard"><div class="klbl">לידים חדשים</div><div class="kval" style="color:var(--L)">${nL}</div></div>
    <div class="kcard"><div class="klbl">אירועים סגורים</div><div class="kval" style="color:#16a34a">${closedEv}</div></div>
    <div class="kcard"><div class="klbl">משימות באיחור</div><div class="kval" style="color:#ef4444">${overdueEvTasks.length}</div></div>
    <div class="kcard"><div class="klbl">חוזים לא חתומים</div><div class="kval" style="color:#f59e0b">${unsigned}</div></div>
    <div class="kcard"><div class="klbl">סה"כ הכנסות</div><div class="kval" style="font-size:19px">${money(totalRevenue)}</div></div>
  </div>

  <div class="bgrid" style="grid-template-columns:1fr 1fr">
    <!-- אירועים לפי שלב -->
    <div class="bcard">
      <div class="btitle">🎯 אירועים לפי שלב תפעולי</div>
      ${OP_STAGES.map(s=>{
        const cnt=stageCount[s.k]||0;
        const mx=Math.max(...Object.values(stageCount),1);
        return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div style="min-width:120px;font-size:12px">${s.l}</div>
          <div style="flex:1;background:#f0f0f0;border-radius:3px;height:6px;overflow:hidden"><div style="width:${Math.round(cnt/mx*100)}%;height:100%;background:var(--K);border-radius:3px"></div></div>
          <div style="font-size:12px;color:#888;min-width:20px;text-align:left">${cnt}</div>
        </div>`;
      }).join('')}
    </div>

    <!-- משימות באיחור -->
    <div class="bcard">
      <div class="btitle">🔴 משימות באיחור</div>
      ${overdueEvTasks.length?overdueEvTasks.slice(0,7).map(t=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f5f5f5">
        <input type="checkbox" style="accent-color:var(--L)" onclick="toggleEventTask(${t.evId},${t.id});renderContent()">
        <div style="flex:1"><span style="font-size:12px;font-weight:600">${t.title}</span>
        <span style="font-size:11px;color:#888"> — ${t.evCust}</span></div>
        <span class="badge" style="background:#fee2e2;color:#dc2626">${t.due}</span>
      </div>`).join(''):'<div style="color:#16a34a;font-size:13px;padding:8px 0">אין משימות באיחור 🎉</div>'}
    </div>

    <!-- אירועים קרובים -->
    <div class="bcard">
      <div class="btitle">📅 אירועים קרובים</div>
      ${upcoming.length?upcoming.map(e=>{
        const days=Math.ceil((new Date(e.date)-today)/(1000*60*60*24));
        return`<div onclick="openEvent(${e.id})" style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f5f5f5;cursor:pointer">
          <span style="background:var(--K50);color:var(--K);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;min-width:50px;text-align:center">${e.date.slice(8,10)}/${e.date.slice(5,7)}</span>
          <div style="flex:1"><div style="font-size:13px;font-weight:600">${e.cust}</div>
          <div style="font-size:11px;color:#888">${money(e.total)} • ${e.kids} ילדים</div></div>
          <span style="font-size:11px;color:${days<=7?'#ef4444':'#888'};font-weight:600">בעוד ${days} ימים</span>
        </div>`;
      }).join(''):'<div style="color:#aaa;font-size:13px;padding:8px 0">אין אירועים קרובים</div>'}
    </div>

    <!-- כספים -->
    <div class="bcard">
      <div class="btitle">💰 תמונת כספים</div>
      <div style="padding:6px 0">
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5"><span style="font-size:13px;color:#555">סה"כ ערך אירועים</span><span style="font-weight:700">${money(totalRevenue)}</span></div>
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5"><span style="font-size:13px;color:#555">נגבה (מקדמות)</span><span style="font-weight:700;color:#16a34a">${money(collected)}</span></div>
        <div style="display:flex;justify-content:space-between;padding:8px 0"><span style="font-size:13px;color:#555">יתרה לגבייה</span><span style="font-weight:800;color:var(--L)">${money(totalRevenue-collected)}</span></div>
      </div>
    </div>
  </div>

  <div style="padding:0 14px 14px">
    <div class="bcard">
      <div class="btitle">🧑‍💼 שליטה לפי נציג מכירות — לידים לפי סטטוס</div>
      <table class="tbl"><thead><tr>
        <th>נציג מכירות</th><th>לקוח חדש</th><th>בתהליך פגישה</th><th>נקבעה פגישה</th><th>היו בפגישה</th><th>נסגר אירוע</th><th>פגישות</th><th>סה"כ לידים</th>
      </tr></thead><tbody>
      ${repRows.length?repRows.map(([r,v])=>`<tr>
        <td style="font-weight:700">${r}</td>
        <td>${v['6']||0}</td><td>${v['9']||0}</td><td>${v['5']||0}</td><td>${v['2']||0}</td>
        <td style="color:#16a34a;font-weight:700">${v['11']||0}</td>
        <td style="color:var(--K);font-weight:600">${repMeet[r]||0}</td>
        <td style="font-weight:800;color:var(--L)">${v.tot}</td>
      </tr>`).join(''):'<tr><td colspan="8" style="text-align:center;color:#aaa;padding:18px">אין נתונים</td></tr>'}
      </tbody></table>
    </div>
  </div>`;
}

// קודי גישה → תפקיד. כרגע: מנהל בלבד. בעתיד אפשר להוסיף אנשי מכירות, למשל '1234':'sales'
/* קודי גישה לפורטל:
   2223 → בעלים (אבידן): שני הממשקים — לידים + משרד מלא כולל רובריקת חוזים
   3334 → מנהל: משרד בלבד, רמת מנהל (כמו עד היום)
   2580 → שף (אורן): משרד בלבד, תצוגת תפריטים */
const ACCESS_CODES = {
  '2223': { both:true,  office:'owner'   },
  '3334': { both:false, office:'manager' },
  '2580': { both:false, office:'chef'    }
};

function _lxHideAll(){
  ['loginScreen','homeScreen','officeScreen'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});
  const c=document.getElementById('crmApp');if(c)c.style.display='none';
}
function lxLogin(){
  const v=(document.getElementById('lxCode').value||'').trim();
  const acc=ACCESS_CODES[v];
  const err=document.getElementById('lxErr');
  if(!acc){err.textContent='קוד שגוי, נסה שוב';return;}
  err.textContent='';
  document.getElementById('lxCode').value='';
  window._ROLE = acc.both ? 'all' : 'office';   // 'all' = רואה הכל, 'office' = משרד בלבד
  window._OFFICEROLE = acc.office;              // owner / manager / chef בתוך המשרד
  if(acc.both){ goHome(); } else { showOffice(); }
}
function lxLogout(){
  window._ROLE=null; window._OFFICEROLE=null;
  try{ localStorage.removeItem('louie_auth'); localStorage.removeItem('louie_role'); }catch(e){}
  const ob=document.getElementById('officeBody'); if(ob){ ob.innerHTML=''; delete ob.dataset.officerole; }
  _lxHideAll();
  const l=document.getElementById('loginScreen');l.style.display='flex';
  setTimeout(()=>{const i=document.getElementById('lxCode');if(i)i.focus();},50);
}
function goHome(){
  if(window._ROLE!=='all'){ showOffice(); return; }   // הרשאת משרד-בלבד אינה רואה מסך בית
  _lxHideAll();
  document.getElementById('homeScreen').style.display='flex';
  document.getElementById('hxRole').textContent='גישת בעלים — רואה הכל';
}
function showCRM(){
  _lxHideAll();
  document.getElementById('crmApp').style.display='block';
  try{ if(typeof setRole==='function') setRole('admin'); }catch(e){}
}
function showOffice(){
  _lxHideAll();
  document.getElementById('officeScreen').style.display='flex';
  const body=document.getElementById('officeBody');
  const offRole=window._OFFICEROLE||'manager';

  /* כפתור החזרה: בעלים → "בית"; הרשאת משרד-בלבד → "יציאה" */
  const back=document.querySelector('#officeScreen .ox-back');
  if(back){
    if(window._ROLE==='all'){ back.textContent='← בית'; back.onclick=goHome; }
    else { back.textContent='← יציאה'; back.onclick=lxLogout; }
  }

  if(OFFICE_URL){
    body.innerHTML='<iframe src="'+OFFICE_URL+'" style="width:100%;height:100%;border:none"></iframe>';
    return;
  }
  /* בונים מחדש רק אם אין iframe או שהתפקיד בתוך המשרד השתנה */
  if(body.querySelector('iframe') && body.dataset.officerole===offRole) return;
  try{
    /* קובעים את התפקיד מראש — מערכת המשרד קוראת זאת מ-localStorage ומדלגת על מסך הקוד שלה */
    try{ localStorage.setItem('louie_auth','1'); localStorage.setItem('louie_role',offRole); }catch(e){}
    var bin=atob(OFFICE_DOC_B64), len=bin.length, bytes=new Uint8Array(len);
    for(var i=0;i<len;i++){ bytes[i]=bin.charCodeAt(i); }
    var html=new TextDecoder('utf-8').decode(bytes);
    var f=document.createElement('iframe');
    f.setAttribute('style','width:100%;height:100%;border:none');
    f.setAttribute('allow','web-share; clipboard-read; clipboard-write');
    /* לאחר שהמשרד נטען וקרא את התפקיד — מנקים את ה-localStorage כדי שלא תידלוף הרשאה לשימוש ישיר בקובץ המשרד */
    f.onload=function(){ try{ localStorage.removeItem('louie_auth'); localStorage.removeItem('louie_role'); }catch(e){} };
    /* טעינה דרך srcdoc (ולא blob:) — אמין ב-WebView של iOS, ונשאר same-origin עבור Firebase/localStorage */
    f.srcdoc=html;
    body.innerHTML='';
    body.appendChild(f);
    body.dataset.officerole=offRole;
  }catch(e){
    body.innerHTML='<div class="ox-ph"><h3>שגיאה בטעינת ממשק המשרד</h3><p style="direction:ltr">'+(e&&e.message?e.message:e)+'</p></div>';
  }
}
/* קישור לקוח/ספק (#cseat / #csign / #sign) — דילוג על מסך הכניסה וטעינת מערכת המשרד,
   שתזהה את ה-hash מהחלון העליון ותיכנס למצב מילוי/חתימה של הלקוח */
function lxClientBoot(){
  _lxHideAll();
  const scr=document.getElementById('officeScreen'); if(scr) scr.style.display='flex';
  const back=document.querySelector('#officeScreen .ox-back'); if(back) back.style.display='none';
  const body=document.getElementById('officeBody'); if(!body) return;
  if(OFFICE_URL){ body.innerHTML='<iframe src="'+OFFICE_URL+location.hash+'" style="width:100%;height:100%;border:none" allow="web-share; clipboard-read; clipboard-write"></iframe>'; return; }
  try{
    var bin=atob(OFFICE_DOC_B64), len=bin.length, bytes=new Uint8Array(len);
    for(var i=0;i<len;i++){ bytes[i]=bin.charCodeAt(i); }
    var html=new TextDecoder('utf-8').decode(bytes);
    var f=document.createElement('iframe');
    f.setAttribute('style','width:100%;height:100%;border:none');
    f.setAttribute('allow','web-share; clipboard-read; clipboard-write');
    f.srcdoc=html;
    body.innerHTML=''; body.appendChild(f);
  }catch(e){ body.innerHTML='<div class="ox-ph"><h3>שגיאה בטעינה</h3></div>'; }
}
function lxIsClientLink(){ return /(?:cseat|csign|sign)=[A-Za-z0-9_-]+/.test((location.hash||'')+' '+(location.search||'')); }
/* כניסה עם Enter + פוקוס ראשוני */
(function(){
  if(lxIsClientLink()){ lxClientBoot(); return; }
  const i=document.getElementById('lxCode');
  if(i){ i.addEventListener('keydown',e=>{if(e.key==='Enter')lxLogin();}); i.focus(); }
})();
</script>
